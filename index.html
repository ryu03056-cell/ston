/* ── 엑셀 날짜 변환 (숫자 → YYYY-MM-DD) ── */
const parseExcelDate = val => {
  if (!val && val !== 0) return "";
  // 이미 날짜 형식이면 그대로
  if (typeof val === "string" && /^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  const num = parseInt(val);
  // 엑셀 일련번호 범위 (40000~60000 = 약 2009~2064년)
  if (!isNaN(num) && num > 40000 && num < 70000) {
    const d = new Date((num - 25569) * 86400000);
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth()+1).padStart(2,"0");
    const dd = String(d.getUTCDate()).padStart(2,"0");
    return `${y}-${m}-${dd}`;
  }
  return String(val||"");
};

    "담당자":       r.lead||"",

    "계약금액":     r.계약금액||0,
  }));

/* ══════════════════════════════════════
   현장 관리 (수정·삭제·엑셀출력 포함)

function SiteManager({rows,setRows,members,isAdmin}) {
  const fileRef=useRef();
  const [search,  setSearch] =useState("");
  const [preview, setPreview]=useState(null);
  const [editM,   setEditM]  =useState(null);
  const [editF,   setEditF]  =useState({});
  const [colF,    setColF]   =useState({});
  const [openDD,  setOpenDD] =useState(null);
  const [ddSrch,  setDdSrch] =useState("");
  const [confirm, setConfirm]=useState(null);
  const [viewMode, setViewMode]=useState("progress");
  const [addOpen, setAddOpen]=useState(false);
  const [addF,    setAddF]   =useState({});
  const [toast,   setToast]  =useState(null); // {msg, type}
  const toastTimer=useRef(null);

  const showToast=(msg,type="success")=>{
    clearTimeout(toastTimer.current);
    setToast({msg,type});
    toastTimer.current=setTimeout(()=>setToast(null),2800);
  };

  const fCols=["점검종류","지역","학교명","납품방법"];
  const uniq=col=>[...new Set(rows.map(r=>r[col]).filter(Boolean))].sort();
  const isFilt=col=>colF[col]&&colF[col].size>0;
  const togCol=(col,val)=>setColF(p=>{const s=new Set(p[col]||[]);s.has(val)?s.delete(val):s.add(val);return{...p,[col]:s};});
  const clrCol=col=>setColF(p=>({...p,[col]:new Set()}));

  const update=updated=>{setRows(updated);fbRows(updated);};

  /* 행 삭제 */
  const deleteRow=id=>{
    const updated=rows.filter(r=>r.id!==id);
    update(updated); setConfirm(null);
    showToast("삭제됐습니다","delete");
  };

  /* 행 수정 저장 */
  const saveEdit=()=>{
    const updated=rows.map(r=>r.id===editM.id?{...r,...editF}:r);
    update(updated); setEditM(null); setEditF({});
  };

  /* 새 현장 추가 저장 */
  const saveAdd=()=>{
    if(!addF.학교명||!addF.학교명.trim()){alert("학교명을 입력하세요");return;}
    const maxNo=rows.reduce((m,r)=>Math.max(m,r.no||0),0);
    const newRow={
      id:`r_${Date.now()}`,
      no:maxNo+1,
      점검종류:addF.점검종류||"",
      지역:addF.지역||"",
      학교명:addF.학교명.trim(),
      시설명:(addF.시설명||"").trim(),
      동수:parseInt(addF.동수)||0,
      연면적:parseFloat(addF.연면적)||0,
      현장조사:addF.현장조사||"",
      착수일:addF.착수일||"",
      완수일:addF.완수일||"",
      FMS:addF.FMS||"",
      특기사항:addF.특기사항||"",
      납품방법:addF.납품방법||"현장납품",
      lead:addF.lead||members[0]||"",
      progress:0,
      status:addF.status||"예정",
      계약금액:parseInt(addF.계약금액)||0,
      현장참여:[]
    };
    update([...rows,newRow]);
    setAddOpen(false); setAddF({});
    showToast(`✅ ${newRow.학교명} 추가됐습니다`);
  };

  /* 엑셀 파싱 — 업로드 시 기존 데이터 교체 */
  const handleFile=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const data=XLSX.utils.sheet_to_json(ws,{defval:""});
        const parsed=data.map((r,i)=>({
          id:`r_${Date.now()}_${i}`,
          no:r["No."]||r["NO"]||i+1,
          점검종류:r["점검종류"]||"",
          지역:r["지역"]||"",
          학교명:r["학교명"]||"",
          시설명:r["시설명"]||"",
          동수:parseInt(r["동수"])||0,
          연면적:parseFloat(r["연면적(m²)"]||r["연면적"])||0,
          현장조사:parseExcelDate(r["현장조사"]||r["현장조사일"]||""),
          착수일:parseExcelDate(r["착수일"]||""),
          완수일:parseExcelDate(r["완수일"]||""),
          FMS:r["FMS 아이디/비번"]||r["FMS"]||"",
          특기사항:r["특기사항"]||"",
          납품방법:r["납품방법"]||"현장납품",
          lead:r["담당자"]||members[0]||"",
          progress:0,
          status:r["상태"]||(parseInt(r["진행단계"]||0)===6?"완료":parseInt(r["진행단계"]||0)>0?"진행중":"예정"),
          계약금액:parseInt(r["계약금액"])||0,
          현장참여:[]
        })).filter(r=>r.학교명);
        setPreview(parsed);
      }catch(err){alert("파일을 읽을 수 없어요.");}
    };
    reader.readAsArrayBuffer(file); e.target.value="";
  };

  const filtered=rows.filter(r=>{
    const p=r.progress||0;
    if(viewMode==="progress"&&p>=6)return false;
    if(viewMode==="done"&&p<6)return false;
    if(search&&!`${r.학교명}${r.시설명}${r.지역}`.includes(search))return false;
    for(const col of fCols){const s=colF[col];if(s&&s.size>0&&!s.has(r[col]))return false;}
    return true;
  });
  const cntProg=rows.filter(r=>(r.progress||0)<6).length;
  const cntDone=rows.filter(r=>r.progress===6).length;

  const hdrs=[
    {k:"no",l:"No."},{k:"점검종류",l:"점검종류",f:true},{k:"지역",l:"지역",f:true},
    {k:"학교명",l:"학교명",f:true},{k:"시설명",l:"시설명"},{k:"동수",l:"동수"},
    {k:"연면적",l:"연면적(㎡)"},{k:"현장조사",l:"현장조사일"},{k:"착수일",l:"착수일"},
    {k:"완수일",l:"완수일"},{k:"출력기간",l:"D-Day"},{k:"특기사항",l:"특기사항"},
    {k:"납품방법",l:"납품방법",f:true},{k:"lead",l:"담당"},{k:"progress",l:"진행단계"},
    {k:"status",l:"상태"},{k:"actions",l:"관리"},
  ];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}} onClick={()=>setOpenDD(null)}>
      {/* 토스트 메시지 */}
      {toast&&(
        <div style={{position:"fixed",bottom:88,left:"50%",transform:"translateX(-50%)",
          background:toast.type==="delete"?"#1e293b":"#16a34a",
          color:"#fff",padding:"12px 22px",borderRadius:28,fontSize:13,fontWeight:600,
          boxShadow:"0 8px 24px rgba(0,0,0,0.18)",zIndex:999,
          display:"flex",alignItems:"center",gap:8,whiteSpace:"nowrap",
          animation:"fadeInUp 0.2s ease"}}>
          {toast.type==="delete"?"🗑 ":"✅ "}{toast.msg}
        </div>
      )}

function UrgentReport({rows,setRows}) {
  const [showDone, setShowDone]=useState(false);
  const inProgress=[...rows].filter(r=>r.progress<6).sort((a,b)=>{
    const da=diffDays(a.완수일), db=diffDays(b.완수일);
    if(da===null&&db===null)return 0;
    if(da===null)return 1;
    if(db===null)return -1;
    return da-db;
  });
  const completed=[...rows].filter(r=>r.progress===6).sort((a,b)=>a.학교명.localeCompare(b.학교명));
  const sorted=showDone?completed:inProgress;
  const firstPending=inProgress.findIndex(r=>!r.완수일);
  const pendingCount=inProgress.filter(r=>!r.완수일).length;
  const updProg=(id,step)=>{
    const autoStatus=step===0?"예정":step===6?"완료":"진행중";
    const u=rows.map(r=>r.id===id?{...r,progress:step,status:autoStatus}:r);
    setRows(u);fbRows(u);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:"#eff6ff",borderRadius:12,padding:"12px 16px",border:"1px solid #bfdbfe",fontSize:13,color:"#1d4ed8"}}>
        🚨 <strong>보고서 완수일 기준 긴급도 순위</strong> — 단계 버튼 클릭으로 바로 수정 · Firebase 실시간 저장
      </div>

      {/* 진행중 / 완료 탭 */}
      <div style={{display:"flex",background:"#e2e8f0",borderRadius:12,padding:4,gap:2}}>
        <button onClick={()=>setShowDone(false)}
          style={{flex:1,border:"none",background:!showDone?"#fff":"transparent",padding:"9px",borderRadius:9,fontSize:13,fontWeight:600,color:!showDone?"#0f172a":"#64748b",cursor:"pointer",fontFamily:"inherit",boxShadow:!showDone?"0 1px 3px rgba(0,0,0,.08)":"none",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          🚨 진행중 <span style={{background:!showDone?"#ef4444":"#cbd5e1",color:"#fff",fontSize:11,padding:"1px 7px",borderRadius:10,fontWeight:700}}>{inProgress.length}</span>
        </button>
        <button onClick={()=>setShowDone(true)}
          style={{flex:1,border:"none",background:showDone?"#fff":"transparent",padding:"9px",borderRadius:9,fontSize:13,fontWeight:600,color:showDone?"#0f172a":"#64748b",cursor:"pointer",fontFamily:"inherit",boxShadow:showDone?"0 1px 3px rgba(0,0,0,.08)":"none",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          ✅ 완료보고서 <span style={{background:showDone?"#16a34a":"#cbd5e1",color:"#fff",fontSize:11,padding:"1px 7px",borderRadius:10,fontWeight:700}}>{completed.length}</span>
        </button>
      </div>

      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",overflow:"hidden"}}>
        {sorted.length===0&&<div style={{padding:48,textAlign:"center",color:"#94a3b8"}}>{showDone?"완료된 보고서가 없어요":"🎉 모든 보고서가 완료됐어요!"}</div>}

        {/* ── 완료 목록 ── */}
        {showDone&&sorted.map((r,i)=>(
          <div key={r.id} style={{borderBottom:"1px solid #f1f5f9",background:i%2?"#f9fafb":"#fff"}}>
            <div style={{display:"flex",alignItems:"center",padding:"14px 20px",gap:12,flexWrap:"wrap"}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:"#16a34a",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>✓</div>
              <div style={{flex:1,minWidth:180}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{r.학교명} <span style={{fontSize:11,color:"#64748b",fontWeight:400}}>· {r.시설명}</span></div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  {r.lead&&<div style={{display:"flex",alignItems:"center",gap:4}}><Av name={r.lead} size={18}/><span style={{fontSize:11}}>{r.lead}</span></div>}
                  <span style={{fontSize:11,color:"#64748b"}}>{r.완수일||"완수일 없음"}</span>
                </div>
              </div>
              <button onClick={()=>updProg(r.id,5)}
                style={{padding:"7px 14px",borderRadius:10,border:"1px solid #f97316",background:"#fff7ed",color:"#c2410c",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>
                ↩ 되돌리기
              </button>
            </div>
          </div>
        ))}

        {/* ── 진행중 목록 ── */}
        {!showDone&&sorted.map((r,i)=>{
          const isPending=!r.완수일;
          const d=diffDays(r.완수일);
          const rc=isPending?"#cbd5e1":i===0?"#ef4444":i===1?"#f97316":i===2?"#eab308":"#94a3b8";
          const showDivider=i===firstPending&&firstPending>0;
          return(
            <React.Fragment key={r.id}>
              {showDivider&&<div style={{padding:"12px 20px",background:"#f8fafc",borderTop:"1px solid #e5e7eb",borderBottom:"1px solid #e5e7eb",fontSize:12,fontWeight:700,color:"#64748b",display:"flex",alignItems:"center",gap:8}}>
                📋 완수일 미정 · 계약 대기 <span style={{background:"#e2e8f0",color:"#475569",borderRadius:10,padding:"1px 8px",fontSize:11}}>{pendingCount}건</span>
              </div>}
              <div style={{borderBottom:"1px solid #f1f5f9",background:isPending?"#fafbfc":i===0?"#fff8f8":i===1?"#fff9f5":"#fff",opacity:isPending?0.85:1}}>
                <div style={{display:"flex",alignItems:"center",padding:"14px 20px",gap:12,flexWrap:"wrap"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:rc,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:isPending?11:14,flexShrink:0}}>{isPending?"—":i+1}</div>
                  <div style={{flex:1,minWidth:200}}>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:5}}>{r.학교명} <span style={{fontSize:11,color:"#64748b",fontWeight:400}}>· {r.시설명}</span></div>
                    <PBar step={r.progress||0} compact/>
                  </div>
                  {r.lead&&<div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}><Av name={r.lead} size={24}/><span style={{fontSize:11,fontWeight:600}}>{r.lead}</span></div>}
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,flexShrink:0}}>
                    <span style={{fontSize:10,color:"#94a3b8"}}>완수일</span>
                    <span style={{fontSize:12,color:isPending?"#94a3b8":"#ea580c",fontWeight:600}}>{r.완수일||"미정"}</span>
                    <span style={{fontSize:11,color:r.납품방법==="현장납품"?"#1d4ed8":"#7c3aed",fontWeight:600}}>{r.납품방법==="현장납품"?"🏫 현장":"📦 택배"}</span>
                  </div>
                  <div style={{background:isPending?"#e2e8f0":urgBg(d),color:isPending?"#64748b":urgC(d),borderRadius:10,padding:"8px 14px",fontWeight:800,fontSize:isPending?13:20,minWidth:70,textAlign:"center",flexShrink:0}}>{isPending?"미정":dLabel(d)}</div>
                </div>
                <div style={{padding:"0 20px 14px 64px",display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:11,color:"#94a3b8",marginRight:4}}>단계 업데이트:</span>
                  {STEPS.map((st,idx)=>(
                    <button key={st} onClick={()=>updProg(r.id,idx+1)}
                      style={{padding:"5px 12px",borderRadius:20,border:"1px solid",fontSize:11,cursor:"pointer",fontWeight:600,
                        borderColor:r.progress===idx+1?"#1d4ed8":r.progress>idx+1?"#86efac":"#e5e7eb",
                        background:r.progress===idx+1?"#1d4ed8":r.progress>idx+1?"#f0fdf4":"#fff",
                        color:r.progress===idx+1?"#fff":r.progress>idx+1?"#16a34a":"#6b7280"}}>
                      {r.progress>idx+1?"✓ ":""}{st}
                    </button>
                  ))}
                  <button onClick={()=>updProg(r.id,0)} style={{padding:"5px 10px",borderRadius:20,border:"1px solid #e5e7eb",fontSize:11,cursor:"pointer",color:"#94a3b8",background:"#f8fafc"}}>초기화</button>
                </div>
              </div>
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function Calendar({rows}) {
  const [yr,setYr]=useState(TODAY.getFullYear());
  const [mo,setMo]=useState(TODAY.getMonth());
  const [sel,setSel]=useState(null);
  const [notes,setNotes]=useState({}); // {YYYY-MM-DD: "메모내용"}
  const [noteInput,setNoteInput]=useState("");
  const noteSaveTimer=useRef(null);
  const [isMobile,setIsMobile]=useState(typeof window!=="undefined"&&window.innerWidth<768);
  useEffect(()=>{
    const h=()=>setIsMobile(window.innerWidth<768);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);

  // Firebase에서 메모 불러오기
  useEffect(()=>{
    const ref=db.ref("calNotes");
    ref.on("value",snap=>{const d=snap.val();setNotes(d||{});});
    return()=>ref.off();
  },[]);

  // 날짜 선택 시 해당 메모 입력창에 세팅
  const selKey=sel?`${yr}-${String(mo+1).padStart(2,"0")}-${String(sel).padStart(2,"0")}`:null;
  useEffect(()=>{ if(selKey)setNoteInput(notes[selKey]||""); },[sel,selKey]);

  // 메모 자동저장 (입력 후 1초 뒤)
  const handleNoteChange=val=>{
    setNoteInput(val);
    clearTimeout(noteSaveTimer.current);
    noteSaveTimer.current=setTimeout(()=>{
      if(!selKey)return;
      if(val.trim()) db.ref(`calNotes/${selKey}`).set(val.trim());
      else db.ref(`calNotes/${selKey}`).remove();
      setNotes(n=>({...n,[selKey]:val.trim()}));
    },1000);
  };
  const first=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  const weeks=[];let d=1-first;
  while(d<=dim){const w=[];for(let i=0;i<7;i++,d++)w.push(d>0&&d<=dim?d:null);weeks.push(w);}
  const evMap={};
  rows.forEach(r=>{
    const add=(ds,t)=>{if(!ds)return;const dd=new Date(ds);if(dd.getFullYear()===yr&&dd.getMonth()===mo){const k=dd.getDate();if(!evMap[k])evMap[k]={s:[],r:[]};evMap[k][t].push(r);}};
    add(r.현장조사,"s"); add(r.완수일,"r");
  });
  const mn=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const dn=["일","월","화","수","목","금","토"];
  const pM=()=>{mo===0?(setMo(11),setYr(y=>y-1)):setMo(m=>m-1);setSel(null);};
  const nM=()=>{mo===11?(setMo(0),setYr(y=>y+1)):setMo(m=>m+1);setSel(null);};
  const sev=sel?evMap[sel]||{s:[],r:[]}:{s:[],r:[]};
  return(
    <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 290px",gap:isMobile?12:18}}>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",overflow:"hidden"}}>

                {d&&<>
                  <div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:isT?"#1d4ed8":"transparent",color:isT?"#fff":di===0?"#ef4444":di===6?"#3b82f6":"#1e293b",fontSize:12,fontWeight:isT?700:500}}>{d}</div>
                  {(ev.s.length>0||ev.r.length>0)&&<div style={{display:"flex",gap:3,flexWrap:"wrap",justifyContent:"center"}}>
                    {ev.s.length>0&&<span style={{background:"#3b82f6",color:"#fff",fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,lineHeight:1.4,minWidth:18,textAlign:"center"}}>{ev.s.length}</span>}
                    {ev.r.length>0&&<span style={{background:"#f97316",color:"#fff",fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,lineHeight:1.4,minWidth:18,textAlign:"center"}}>{ev.r.length}</span>}
                  </div>}

                </>}
              </div>;
            })}

        ))}
      </div>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",padding:18,overflowY:"auto"}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:12,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span>{sel?`${mo+1}월 ${sel}일`:"날짜를 클릭하세요"}</span>
          {sel&&(sev.s.length>0||sev.r.length>0)&&<>
            {sev.s.length>0&&<span style={{background:"#dbeafe",color:"#1d4ed8",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10}}>🔵 현장조사 {sev.s.length}</span>}
            {sev.r.length>0&&<span style={{background:"#ffedd5",color:"#c2410c",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10}}>🟠 완수일 {sev.r.length}</span>}
          </>}
        </div>
        {!sel&&<div style={{color:"#94a3b8",fontSize:12,textAlign:"center",marginTop:40}}>{isMobile?"↑ 위에서 날짜를 선택하면":"날짜를 선택하면"}<br/>일정이 표시됩니다</div>}
        {sel&&sev.s.length===0&&sev.r.length===0&&<div style={{color:"#94a3b8",fontSize:12,textAlign:"center",marginTop:40}}>이 날 일정 없음</div>}
        {sev.s.map(r=>(
          <div key={r.id} style={{background:"#eff6ff",borderRadius:8,padding:"12px",marginBottom:8,borderLeft:"3px solid #3b82f6"}}>

            <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>{r.학교명}</div>
            <div style={{fontSize:11,color:"#64748b"}}>{r.시설명} · {r.지역}</div>
            {r.lead&&<div style={{display:"flex",alignItems:"center",gap:5,marginTop:6}}><Av name={r.lead} size={18}/><span style={{fontSize:11,fontWeight:600}}>{r.lead}</span></div>}
            <div style={{marginTop:8}}><PBar step={r.progress||0} compact/></div>

        ))}
        {sev.r.map(r=>{

          return(
            <div key={r.id} style={{background:"#fff7ed",borderRadius:8,padding:"12px",marginBottom:8,borderLeft:"3px solid #f97316"}}>
              <div style={{fontSize:11,color:"#ea580c",fontWeight:700,marginBottom:4}}>🟠 보고서 완수일</div>

              <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>{r.납품방법==="현장납품"?"🏫 현장납품":"📦 택배납품"}</div>
              <span style={{background:urgBg(d),color:urgC(d),borderRadius:20,padding:"2px 10px",fontWeight:700,fontSize:12}}>{dLabel(d)}</span>
              <div style={{marginTop:8}}><PBar step={r.progress||0} compact/></div>
            </div>
          );
        })}

        {/* 메모 입력 */}
        {sel&&<div style={{marginTop:12,borderTop:"1px solid #f1f5f9",paddingTop:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
            📝 메모 / 요청사항
            <span style={{fontSize:10,color:"#94a3b8",fontWeight:400}}>— 팀 전체에 공유됩니다</span>
          </div>
          <textarea value={noteInput} onChange={e=>handleNoteChange(e.target.value)}
            placeholder="학교 요청사항, 특이사항, 준비물 등 자유롭게 입력..."
            style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:10,padding:"10px 12px",fontSize:13,resize:"vertical",minHeight:80,boxSizing:"border-box",outline:"none",lineHeight:1.6,color:"#1e293b",background:noteInput?"#fefce8":"#f8fafc",transition:"background 0.2s"}}/>
          <div style={{fontSize:10,color:noteInput?"#7c3aed":"#cbd5e1",marginTop:4,textAlign:"right",fontWeight:noteInput?600:400}}>
            {noteInput?"✅ 자동 저장됨":"입력 후 자동으로 저장돼요"}
          </div>
        </div>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   팀 채팅

function Chat({user,members}) {
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [room,setRoom]=useState("전체");
  const [uploading,setUploading]=useState(false);
  const [unread,setUnread]=useState({}); // {방이름: count}
  const [subscribed, setSubscribed]=useState(false);
  const [notifPerm,setNotifPerm]=useState(typeof Notification!=="undefined"?Notification.permission:"denied");
  const [isMobile,setIsMobile]=useState(typeof window!=="undefined"&&window.innerWidth<768);
  const imgRef=useRef();
  const bottomRef=useRef();
  const lastSeenRef=useRef({});
  const rooms=["전체","현장조사","보고서작성","공지사항"];
  const rColors={전체:"#1d4ed8",현장조사:"#16a34a",보고서작성:"#7c3aed",공지사항:"#dc2626"};

  useEffect(()=>{
    const h=()=>setIsMobile(window.innerWidth<768);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);

  // OneSignal 구독 상태 확인
  useEffect(()=>{
    const check=()=>{
      window.OneSignalDeferred=window.OneSignalDeferred||[];
      window.OneSignalDeferred.push(async(OS)=>{
        try{
          const opted=await OS.User.PushSubscription.optedIn;
          setSubscribed(!!opted);
        }catch(e){}
      });
    };
    check();
    const t=setTimeout(check,3000); // SDK 로드 후 재확인
    return()=>clearTimeout(t);
  },[]);

  // 알림 권한 요청 (OneSignal v16)
  const reqNotif=()=>{
    window.OneSignalDeferred=window.OneSignalDeferred||[];
    window.OneSignalDeferred.push(async(OS)=>{
      try{
        await OS.Notifications.requestPermission();
        const opted=await OS.User.PushSubscription.optedIn;
        setSubscribed(!!opted);
        if(opted) setNotifPerm("granted");
      }catch(e){
        // fallback: 기본 브라우저 알림
        if(typeof Notification!=="undefined"){
          Notification.requestPermission().then(p=>setNotifPerm(p));
        }
      }
    });
  };

  // 현재 방 메시지 구독
  useEffect(()=>{
    const ref=db.ref(`chat/${room}`);
    ref.on("value",snap=>{
      const d=snap.val();
      const list=d?Object.values(d).sort((a,b)=>a.id-b.id):[];
      setMsgs(list);
      // 이 방 읽음 처리
      if(list.length>0) lastSeenRef.current[room]=list[list.length-1].id;
      setUnread(u=>({...u,[room]:0}));
    });
    return()=>ref.off();
  },[room]);

  // 모든 방 미읽음 수 추적
  useEffect(()=>{
    const listeners={};
    rooms.forEach(r=>{
      listeners[r]=db.ref(`chat/${r}`);
      listeners[r].on("value",snap=>{
        const d=snap.val();
        if(!d)return;
        const list=Object.values(d).sort((a,b)=>a.id-b.id);
        const lastSeen=lastSeenRef.current[r]||0;
        const newMsgs=list.filter(m=>m.id>lastSeen&&m.sender!==user.name);
        if(r!==room){
          setUnread(u=>({...u,[r]:newMsgs.length}));
          // 브라우저 알림
          if(newMsgs.length>0&&notifPerm==="granted"&&document.hidden){
            const last=newMsgs[newMsgs.length-1];
            new Notification(`[${r}] ${last.sender}`,{body:last.imgUrl?"📷 사진":last.text,icon:"https://em-content.zobj.net/source/apple/391/school_1f3eb.png"});
          }
        }
      });
    });
    return()=>rooms.forEach(r=>listeners[r].off());
  },[notifPerm]);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  // OneSignal 푸시 알림 전송 (REST API)
  const OS_APP_ID   = "26e9e8f3-42a8-4553-b8ef-0a84714db091";
  const OS_API_KEY  = "os_v2_app_e3u6r42cvbcvhohpbkchctnqshqaccue7m3u3ov3optghtublkcz55mpgfkmorzhk4rfmcg2ch3qquydcgea4dlmksix3hgufcd7hyy";

  const pushNotif = (title, body) => {
    fetch("https://onesignal.com/api/v1/notifications", {
      method: "POST",
      headers: { "Content-Type":"application/json", "Authorization":`Key ${OS_API_KEY}` },
      body: JSON.stringify({
        app_id: OS_APP_ID,
        included_segments: ["All"],
        headings: { ko: title, en: title },
        contents: { ko: body,  en: body  },
        url: window.location.href,
      })
    })
    .then(r=>r.json())
    .then(d=>{ if(d.errors) console.warn("OneSignal 오류:", JSON.stringify(d.errors)); else console.log("✅ 알림 전송:", d.id); })
    .catch(e=>console.warn("알림 전송 실패:", e));
  };

  const send=()=>{
    if(!input.trim())return;
    const msg={id:Date.now(),sender:user.name,text:input.trim(),room,time:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),date:new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric"})};
    db.ref(`chat/${room}/${msg.id}`).set(msg);
    pushNotif(`[${room}] ${user.name}`, input.trim());
    setInput("");
  };

  // 이미지 업로드
  const handleImg=async(e)=>{
    const file=e.target.files[0]; if(!file)return;
    if(file.size>5*1024*1024){alert("5MB 이하 이미지만 전송 가능해요");return;}
    setUploading(true);
    try{
      const ref=storage.ref(`chat/${room}/${Date.now()}_${file.name}`);
      await ref.put(file);
      const url=await ref.getDownloadURL();
      const msg={id:Date.now(),sender:user.name,imgUrl:url,text:"",room,time:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),date:new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric"})};
      db.ref(`chat/${room}/${msg.id}`).set(msg);
      pushNotif(`[${room}] ${user.name}`, "📷 사진을 보냈어요");
    }catch(err){alert("업로드 실패: "+err.message);}
    setUploading(false);
    e.target.value="";
  };

  const del=id=>db.ref(`chat/${room}/${id}`).remove();
  const grouped=[];let lastDate=null;
  msgs.forEach(m=>{if(m.date!==lastDate){grouped.push({type:"date",date:m.date});lastDate=m.date;}grouped.push({type:"msg",...m});});

  const totalUnread=Object.values(unread).reduce((s,v)=>s+v,0);

  return(
    <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"170px 1fr",gap:16,height:"calc(100vh - 160px)"}}>
      {!isMobile&&<div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",padding:12,display:"flex",flexDirection:"column",gap:4}}>
        <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:6,padding:"0 4px"}}>채팅방</div>
        {rooms.map(r=>(
          <button key={r} onClick={()=>{setRoom(r);lastSeenRef.current[r]=msgs.length>0?msgs[msgs.length-1]?.id||0:0;setUnread(u=>({...u,[r]:0}));}}
            style={{padding:"9px 10px",borderRadius:10,border:"none",cursor:"pointer",textAlign:"left",fontWeight:room===r?700:500,fontSize:13,background:room===r?`${rColors[r]}18`:"transparent",color:room===r?rColors[r]:"#475569",display:"flex",alignItems:"center",gap:8,fontFamily:"inherit"}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:rColors[r],flexShrink:0}}/>
            {r}
            {unread[r]>0&&<span style={{marginLeft:"auto",background:"#ef4444",color:"#fff",fontSize:10,fontWeight:700,minWidth:18,height:18,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{unread[r]}</span>}
          </button>
        ))}
        {/* 알림 버튼 */}
        <div style={{marginTop:"auto",padding:"10px 4px",borderTop:"1px solid #f1f5f9"}}>
          {subscribed
            ?<div style={{width:"100%",padding:"6px",borderRadius:8,background:"#f0fdf4",fontSize:11,color:"#16a34a",marginBottom:8,textAlign:"center",border:"1px solid #86efac"}}>✅ 알림 켜짐</div>
            :<button onClick={reqNotif} style={{width:"100%",padding:"6px",borderRadius:8,border:"1px solid #e5e7eb",background:"#f8fafc",fontSize:11,cursor:"pointer",color:"#475569",marginBottom:8,fontFamily:"inherit"}}>🔔 알림 켜기</button>}
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:MC[user.name]||"#1d4ed8",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12}}>{user.name[0]}</div>
            <div><div style={{fontSize:11,fontWeight:700}}>{user.name}</div><div style={{fontSize:9,color:user.role==="admin"?"#f97316":"#22c55e"}}>● {user.role==="admin"?"관리자":"팀원"}</div></div>
          </div>
        </div>
      </div>}

      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {isMobile&&<div style={{display:"flex",gap:6,padding:"10px 12px",borderBottom:"1px solid #f1f5f9",overflowX:"auto",scrollbarWidth:"none"}}>
          {rooms.map(r=>(
            <button key={r} onClick={()=>{setRoom(r);setUnread(u=>({...u,[r]:0}));}}
              style={{padding:"6px 12px",borderRadius:20,border:"1px solid",borderColor:room===r?rColors[r]:"#e5e7eb",background:room===r?`${rColors[r]}15`:"#fff",color:room===r?rColors[r]:"#64748b",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5,flexShrink:0,fontFamily:"inherit",position:"relative"}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:rColors[r]}}/>{r}
              {unread[r]>0&&<span style={{background:"#ef4444",color:"#fff",fontSize:10,fontWeight:700,minWidth:16,height:16,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px",marginLeft:2}}>{unread[r]}</span>}
            </button>
          ))}
          {subscribed
            ?<span style={{padding:"6px 10px",borderRadius:20,border:"1px solid #86efac",background:"#f0fdf4",fontSize:12,whiteSpace:"nowrap",flexShrink:0,color:"#16a34a"}}>✅</span>
            :<button onClick={reqNotif} style={{padding:"6px 10px",borderRadius:20,border:"1px solid #e5e7eb",background:"#fff",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,fontFamily:"inherit",color:"#475569"}}>🔔</button>}
        </div>}

        <div style={{padding:"12px 18px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:8,background:`${rColors[room]}08`}}>
          <span style={{width:9,height:9,borderRadius:"50%",background:rColors[room]}}/><span style={{fontWeight:700,fontSize:14}}>{room}</span>
          <span style={{fontSize:11,color:"#94a3b8",marginLeft:4}}>{msgs.length}개 메시지</span>
          <span style={{marginLeft:"auto",fontSize:11,color:"#22c55e",background:"#f0fdf4",borderRadius:20,padding:"2px 9px",border:"1px solid #86efac"}}>🟢 실시간</span>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:2,background:"#fafafa"}}>
          {grouped.length===0&&<div style={{textAlign:"center",marginTop:60,color:"#94a3b8"}}><div style={{fontSize:32,marginBottom:10}}>💬</div><div style={{fontSize:14,fontWeight:600}}>아직 메시지가 없어요</div></div>}
          {grouped.map((item,i)=>{
            if(item.type==="date")return<div key={`d${i}`} style={{textAlign:"center",margin:"14px 0 6px"}}><span style={{background:"#e2e8f0",color:"#64748b",borderRadius:20,padding:"3px 12px",fontSize:11}}>{item.date}</span></div>;
            const isMe=item.sender===user.name,color=MC[item.sender]||"#94a3b8";
            return<div key={item.id} style={{display:"flex",flexDirection:isMe?"row-reverse":"row",gap:8,alignItems:"flex-end",marginBottom:5}}>
              {!isMe&&<div style={{width:28,height:28,borderRadius:"50%",background:color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,flexShrink:0}}>{item.sender[0]}</div>}
              <div style={{maxWidth:"70%"}}>
                {!isMe&&<div style={{fontSize:11,color:"#64748b",marginBottom:2,marginLeft:2}}>{item.sender}{item.sender==="관리자"&&<span style={{marginLeft:4,background:"#fff7ed",color:"#f97316",borderRadius:20,padding:"1px 6px",fontSize:9}}>관리자</span>}</div>}
                <div style={{display:"flex",alignItems:"flex-end",gap:5,flexDirection:isMe?"row-reverse":"row"}}>
                  {item.imgUrl
                    ?<img src={item.imgUrl} alt="사진" style={{maxWidth:220,maxHeight:280,borderRadius:12,display:"block",boxShadow:"0 1px 3px rgba(0,0,0,.12)",cursor:"pointer"}} onClick={()=>window.open(item.imgUrl,"_blank")}/>
                    :<div style={{background:isMe?color:"#fff",color:isMe?"#fff":"#1e293b",borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"9px 13px",fontSize:13,lineHeight:1.5,boxShadow:"0 1px 3px rgba(0,0,0,.08)",wordBreak:"break-word"}}>{item.text}</div>
                  }
                  <div style={{fontSize:10,color:"#94a3b8",flexShrink:0}}>{item.time}</div>
                  {(isMe||user.role==="admin")&&<button onClick={()=>del(item.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#cbd5e1",fontSize:11,padding:0}}>🗑</button>}
                </div>
              </div>
            </div>;
          })}
          <div ref={bottomRef}/>
        </div>

        <div style={{padding:"10px 14px",borderTop:"1px solid #f1f5f9",background:"#fff",display:"flex",gap:8,alignItems:"center"}}>
          {/* 사진 전송 버튼 */}
          <button onClick={()=>imgRef.current.click()} disabled={uploading}
            style={{width:38,height:38,borderRadius:10,border:"1px solid #e5e7eb",background:"#f8fafc",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:18}}>
            {uploading?"⏳":"📷"}
          </button>
          <input ref={imgRef} type="file" accept="image/*" capture="environment" onChange={handleImg} style={{display:"none"}}/>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder={`${room} 채팅방에 입력...`}
            style={{flex:1,border:"1px solid #e5e7eb",borderRadius:12,padding:"9px 14px",fontSize:13,outline:"none",background:"#f8fafc"}}/>
          <button onClick={send} disabled={!input.trim()} style={{padding:"9px 18px",borderRadius:12,border:"none",background:input.trim()?rColors[room]:"#e5e7eb",color:"#fff",fontSize:13,fontWeight:700,cursor:input.trim()?"pointer":"default",fontFamily:"inherit"}}>전송</button>
        </div>
      </div>
    </div>
  );
}

function Revenue({rows,setRows}) {
  const [editId,setEditId]=useState(null);
  const [editVal,setEditVal]=useState("");
  const total=rows.reduce((s,r)=>s+(r.계약금액||0),0);
  const pct=(v,t)=>t>0?Math.round(v/t*100):0;
  const saveEdit=id=>{const n=parseInt(editVal.replace(/,/g,""))||0;const u=rows.map(row=>row.id===id?{...row,계약금액:n}:row);setRows(u);fbRows(u);setEditId(null);setEditVal("");};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{background:"#eff6ff",borderRadius:10,padding:"10px 16px",border:"1px solid #bfdbfe",fontSize:12,color:"#1d4ed8"}}>🔐 <strong>관리자 전용</strong></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        {[{l:"총 계약금액",v:total,c:"#1d4ed8"},{l:"납품 완료",v:rows.filter(r=>r.progress===6).reduce((s,r)=>s+(r.계약금액||0),0),c:"#16a34a"},{l:"진행중",v:rows.filter(r=>r.progress>0&&r.progress<6).reduce((s,r)=>s+(r.계약금액||0),0),c:"#7c3aed"},{l:"미착수",v:rows.filter(r=>r.progress===0).reduce((s,r)=>s+(r.계약금액||0),0),c:"#94a3b8"}].map(k=>(
          <div key={k.l} style={{background:"#fff",borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 4px rgba(0,0,0,.07)",borderTop:`3px solid ${k.c}`}}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>{k.l}</div>
            <div style={{fontSize:18,fontWeight:800,color:k.c,marginBottom:4}}>{won(k.v)}</div>
            {total>0&&<div style={{height:4,background:"#f1f5f9",borderRadius:2}}><div style={{height:4,background:k.c,borderRadius:2,width:`${pct(k.v,total)}%`}}/></div>}
          </div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",overflow:"hidden"}}>
        <div style={{padding:"14px 18px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:700,fontSize:14}}>📋 현장별 계약금액</span>
          <button onClick={()=>exportExcel(rows)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #16a34a",background:"#f0fdf4",color:"#16a34a",fontSize:12,fontWeight:600,cursor:"pointer"}}>📥 엑셀 다운로드</button>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#f8fafc"}}>{["학교명","시설명","담당","완수일","진행","계약금액"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",color:"#64748b",fontWeight:600,fontSize:11,borderBottom:"2px solid #e2e8f0"}}>{h}</th>)}</tr></thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={r.id} style={{borderBottom:"1px solid #f1f5f9",background:i%2?"#fafafa":"#fff"}}>
                <td style={{padding:"10px 14px",fontWeight:600}}>{r.학교명}</td>
                <td style={{padding:"10px 14px",color:"#64748b"}}>{r.시설명}</td>
                <td style={{padding:"10px 14px"}}>{r.lead?<div style={{display:"flex",alignItems:"center",gap:5}}><Av name={r.lead} size={18}/><span>{r.lead}</span></div>:"-"}</td>
                <td style={{padding:"10px 14px",color:"#ea580c"}}>{r.완수일||"-"}</td>
                <td style={{padding:"10px 14px",minWidth:120}}><PBar step={r.progress||0} compact/></td>
                <td style={{padding:"10px 14px",minWidth:140}}>
                  {editId===r.id?(
                    <div style={{display:"flex",gap:5,alignItems:"center"}}>
                      <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEdit(r.id);if(e.key==="Escape")setEditId(null);}}
                        style={{width:100,border:"2px solid #1d4ed8",borderRadius:6,padding:"4px 8px",fontSize:12,outline:"none"}}/>
                      <button onClick={()=>saveEdit(r.id)} style={{padding:"4px 8px",borderRadius:6,border:"none",background:"#1d4ed8",color:"#fff",fontSize:11,cursor:"pointer"}}>✓</button>

                    </div>

                    <div onClick={()=>{setEditId(r.id);setEditVal(r.계약금액?String(r.계약금액):"");}}
                      style={{cursor:"pointer",padding:"5px 9px",borderRadius:7,border:"1px dashed",borderColor:r.계약금액?"#e2e8f0":"#fca5a5",background:r.계약금액?"#f8fafc":"#fff1f2",display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontWeight:700,color:r.계약금액?"#1d4ed8":"#f87171"}}>{r.계약금액?won(r.계약금액):"금액 입력"}</span>

                </td>
              </tr>
            ))}
            <tr style={{background:"#0f172a",color:"#fff"}}><td colSpan={5} style={{padding:"11px 14px",fontSize:13,fontWeight:700}}>합계</td><td style={{padding:"11px 14px",fontSize:14,fontWeight:800,color:"#fbbf24"}}>{won(total)}</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Settings({adminPw,setAdminPw,members,setMembers}) {
  const [pf,setPf]=useState({cur:"",next:"",confirm:""});
  const [pm,setPm]=useState(null);
  const [ml,setMl]=useState([...members]);
  const [nm,setNm]=useState("");
  const [mm,setMm]=useState(null);
  const [ei,setEi]=useState(null);
  const [ev,setEv]=useState("");
  const savePw=()=>{
    if(pf.cur!==adminPw){setPm({t:"e",msg:"현재 비밀번호가 틀렸습니다."});return;}
    if(pf.next.length<4){setPm({t:"e",msg:"4자 이상 입력해주세요."});return;}
    if(pf.next!==pf.confirm){setPm({t:"e",msg:"새 비밀번호가 일치하지 않습니다."});return;}
    fbSettings("adminPw",pf.next);setAdminPw(pf.next);setPf({cur:"",next:"",confirm:""});
    setPm({t:"ok",msg:"✅ 비밀번호가 변경됐습니다."});setTimeout(()=>setPm(null),3000);
  };
  const saveM=list=>{fbSettings("members",list);setMembers(list);setMl(list);setMm({t:"ok",msg:"✅ 저장됐습니다."});setTimeout(()=>setMm(null),3000);};
  const addM=()=>{const n=nm.trim();if(!n)return;if(ml.includes(n)){setMm({t:"e",msg:"이미 존재합니다."});return;}saveM([...ml,n]);setNm("");};
  const delM=i=>saveM(ml.filter((_,j)=>j!==i));
  const saveE=i=>{const n=ev.trim();if(!n)return;saveM(ml.map((m,j)=>j===i?n:m));setEi(null);setEv("");};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:18,maxWidth:560}}>
      <div style={{background:"#eff6ff",borderRadius:12,padding:"12px 16px",border:"1px solid #bfdbfe",fontSize:13,color:"#1d4ed8"}}>🔐 <strong>관리자 전용</strong> — 변경사항은 팀 전체에 즉시 반영됩니다.</div>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",overflow:"hidden"}}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid #f1f5f9",fontWeight:700,fontSize:15}}>🔑 관리자 비밀번호 변경</div>
        <div style={{padding:"18px 20px",display:"flex",flexDirection:"column",gap:10}}>
          {[["현재 비밀번호","cur"],["새 비밀번호","next"],["새 비밀번호 확인","confirm"]].map(([l,k])=>(
            <div key={k}><label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>{l}</label>
            <input type="password" value={pf[k]} onChange={e=>setPf(f=>({...f,[k]:e.target.value}))} placeholder={l}
              style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:9,padding:"9px 12px",fontSize:13,boxSizing:"border-box",outline:"none"}}/></div>
          ))}
          {pm&&<div style={{padding:"7px 12px",borderRadius:8,background:pm.t==="ok"?"#f0fdf4":"#fef2f2",color:pm.t==="ok"?"#16a34a":"#dc2626",fontSize:12}}>{pm.msg}</div>}
          <button onClick={savePw} style={{padding:"10px",borderRadius:10,border:"none",background:"#1d4ed8",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>비밀번호 변경</button>
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",overflow:"hidden"}}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid #f1f5f9",fontWeight:700,fontSize:15}}>👥 팀원 이름 관리</div>
        <div style={{padding:"18px 20px"}}>
          <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:14}}>
            {ml.map((m,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0"}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:mColor(m,i),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>{m[0]}</div>
                {ei===i?(
                  <div style={{display:"flex",gap:6,flex:1,alignItems:"center"}}>
                    <input autoFocus value={ev} onChange={e=>setEv(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveE(i);if(e.key==="Escape")setEi(null);}}
                      style={{flex:1,border:"2px solid #1d4ed8",borderRadius:7,padding:"5px 9px",fontSize:13,outline:"none"}}/>
                    <button onClick={()=>saveE(i)} style={{padding:"5px 10px",borderRadius:7,border:"none",background:"#1d4ed8",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>저장</button>
                    <button onClick={()=>setEi(null)} style={{padding:"5px 9px",borderRadius:7,border:"1px solid #e5e7eb",background:"#fff",fontSize:12,cursor:"pointer"}}>취소</button>
                  </div>
                ):(
                  <><span style={{flex:1,fontWeight:600,fontSize:13}}>{m}</span>
                  <button onClick={()=>{setEi(i);setEv(m);}} style={{padding:"4px 9px",borderRadius:7,border:"1px solid #e2e8f0",background:"#fff",fontSize:11,cursor:"pointer"}}>✏️</button>
                  <button onClick={()=>delM(i)} style={{padding:"4px 9px",borderRadius:7,border:"1px solid #fca5a5",background:"#fff1f2",fontSize:11,cursor:"pointer",color:"#dc2626"}}>🗑</button></>
                )}
              </div>
            ))}
          </div>
          <div style={{borderTop:"1px solid #f1f5f9",paddingTop:14}}>
            <div style={{display:"flex",gap:7}}>
              <input value={nm} onChange={e=>setNm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addM()} placeholder="이름 입력"
                style={{flex:1,border:"1px solid #e5e7eb",borderRadius:9,padding:"9px 12px",fontSize:13,outline:"none"}}/>
              <button onClick={addM} style={{padding:"9px 16px",borderRadius:9,border:"none",background:"#1d4ed8",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>추가</button>
            </div>
            {mm&&<div style={{marginTop:7,padding:"6px 10px",borderRadius:8,background:mm.t==="ok"?"#f0fdf4":"#fef2f2",color:mm.t==="ok"?"#16a34a":"#dc2626",fontSize:12}}>{mm.msg}</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

function Overview({rows,total,done,urgCnt,delayed}) {
  const [ovFilter, setOvFilter] = useState({status:"전체",lead:"전체",urgency:"전체"});
  const leads=["전체",...[...new Set(rows.map(r=>r.lead).filter(Boolean))]];
  const statuses=["전체",...STATUS_LIST];
  const urgLabels=["전체","D-7 이내","D-14 이내","완수일 미정","완료"];
  const filtered=rows.filter(r=>{
    if(ovFilter.status!=="전체"&&(r.status||"예정")!==ovFilter.status)return false;
    if(ovFilter.lead!=="전체"&&r.lead!==ovFilter.lead)return false;
    if(ovFilter.urgency!=="전체"){
      const d=diffDays(r.완수일);
      if(ovFilter.urgency==="D-7 이내"&&!(d!==null&&d<=7&&r.progress<6))return false;
      if(ovFilter.urgency==="D-14 이내"&&!(d!==null&&d<=14&&r.progress<6))return false;
      if(ovFilter.urgency==="완수일 미정"&&r.완수일)return false;
      if(ovFilter.urgency==="완료"&&r.progress!==6)return false;
    }
    return true;
  });
  const Chip=({label,active,onClick})=>(
    <button onClick={onClick} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${active?"#1d4ed8":"#e5e7eb"}`,background:active?"#1d4ed8":"#fff",color:active?"#fff":"#475569",fontSize:12,fontWeight:active?700:500,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>
      {label}
    </button>
  );
  return <>
    {/* 통계 카드 */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
      {[{l:"총 점검 건수",v:total,u:"건",c:"#1d4ed8"},{l:"완료",v:done,u:"건",c:"#16a34a"},{l:"D-7 이내 긴급",v:urgCnt,u:"건",c:"#f97316"},{l:"지연",v:delayed,u:"건",c:"#dc2626"}].map(k=>(
        <div key={k.l} style={{background:"#fff",borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 4px rgba(0,0,0,.07)",borderTop:`3px solid ${k.c}`}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:5}}>{k.l}</div>
          <div style={{fontSize:26,fontWeight:800,color:k.c}}>{k.v}<span style={{fontSize:13,fontWeight:500,color:"#94a3b8"}}>{k.u}</span></div>
        </div>
      ))}
    </div>

    {/* 필터 */}
    <div style={{background:"#fff",borderRadius:14,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,.07)",marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        <span style={{fontSize:12,fontWeight:700,color:"#374151",minWidth:36}}>상태</span>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {statuses.map(s=><Chip key={s} label={s} active={ovFilter.status===s} onClick={()=>setOvFilter(f=>({...f,status:s}))}/>)}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        <span style={{fontSize:12,fontWeight:700,color:"#374151",minWidth:36}}>담당자</span>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {leads.map(l=><Chip key={l} label={l} active={ovFilter.lead===l} onClick={()=>setOvFilter(f=>({...f,lead:l}))}/>)}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <span style={{fontSize:12,fontWeight:700,color:"#374151",minWidth:36}}>긴급도</span>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {urgLabels.map(u=><Chip key={u} label={u} active={ovFilter.urgency===u} onClick={()=>setOvFilter(f=>({...f,urgency:u}))}/>)}
        </div>
      </div>
    </div>

    {/* 결과 헤더 */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
      <span style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{filtered.length}건</span>
      {(ovFilter.status!=="전체"||ovFilter.lead!=="전체"||ovFilter.urgency!=="전체")&&
        <button onClick={()=>setOvFilter({status:"전체",lead:"전체",urgency:"전체"})}
          style={{fontSize:11,color:"#dc2626",background:"#fff1f2",border:"1px solid #fca5a5",borderRadius:8,padding:"3px 10px",cursor:"pointer",fontFamily:"inherit"}}>필터 초기화</button>}
    </div>

    {/* 카드 목록 */}
    {filtered.length===0
      ?<div style={{background:"#fff",borderRadius:14,padding:40,textAlign:"center",color:"#94a3b8",boxShadow:"0 1px 4px rgba(0,0,0,.07)"}}>조건에 맞는 현장이 없어요</div>
      :<div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.map((r)=>{
          const d=diffDays(r.완수일);
          return(
            <div key={r.id} style={{background:"#fff",borderRadius:14,padding:"14px 18px",boxShadow:"0 1px 4px rgba(0,0,0,.07)",borderLeft:`4px solid ${urgC(d)||"#e5e7eb"}`,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:160}}>
                <div style={{fontWeight:700,fontSize:13}}>{r.학교명} <span style={{fontSize:11,color:"#94a3b8",fontWeight:400}}>· {r.시설명}</span></div>
                <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap",alignItems:"center"}}>
                  <Bdg label={r.status||"예정"} bg={SS[r.status||"예정"]?.bg||"#f3f4f6"} c={SS[r.status||"예정"]?.c||"#6b7280"}/>
                  {r.lead&&<div style={{display:"flex",alignItems:"center",gap:4}}><Av name={r.lead} size={16}/><span style={{fontSize:11,color:"#475569"}}>{r.lead}</span></div>}
                </div>
              </div>
              <div style={{minWidth:130}}><PBar step={r.progress||0} compact/></div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>완수일</div>
                <div style={{fontSize:12,color:"#ea580c",fontWeight:600,marginBottom:4}}>{r.완수일||"미정"}</div>
                <span style={{background:urgBg(d),color:urgC(d),borderRadius:20,padding:"2px 10px",fontWeight:700,fontSize:12}}>{dLabel(d)}</span>
              </div>
            </div>
          );
        })}
      </div>
    }
  </>;
}

function App() {
  const [user,    setUser]    = useState(null);
  const [tab,     setTab]     = useState("전체 현황");
  const [rows,    setRows]    = useState([]);
  const [adminPw, setAdminPw] = useState(ADMIN_PW_DEFAULT);
  const [members, setMembers] = useState(DEFAULT_MEMBERS);

  /* ✅ 수정: settings + rows 둘 다 로드된 후에만 ready=true */
  const [settLoaded, setSettLoaded] = useState(false);
  const [rowsLoaded, setRowsLoaded] = useState(false);
  const ready = settLoaded && rowsLoaded;

  useEffect(()=>{
    const settRef = db.ref("settings");
    const rowsRef = db.ref("rows");

    settRef.on("value", snap=>{
      const s=snap.val();
      if(s){
        if(s.adminPw) setAdminPw(s.adminPw);
        if(s.members) setMembers(Array.isArray(s.members)?s.members:Object.values(s.members));
      }
      setSettLoaded(true); // ← settings 로드 완료
    });

    rowsRef.on("value", snap=>{
      const data=snap.val();
      if(data) setRows(Object.values(data).sort((a,b)=>(a.no||0)-(b.no||0)));
      else setRows([]);
      setRowsLoaded(true); // ← rows 로드 완료
    });

    return()=>{ settRef.off(); rowsRef.off(); };
  },[]);

  const isAdmin = user?.role==="admin";

  /* 사이드바 열림/닫힘 상태 (모바일에선 기본 닫힘) */
  const [sideOpen, setSideOpen] = useState(typeof window!=="undefined"&&window.innerWidth>=768);
  const [isMobile, setIsMobile] = useState(typeof window!=="undefined"&&window.innerWidth<768);
  const [showTop,  setShowTop]  = useState(false);
  const mainRef = useRef();
  useEffect(()=>{
    const handler=()=>{
      const m=window.innerWidth<768;
      setIsMobile(m);
      setSideOpen(!m);
    };
    window.addEventListener("resize",handler);
    return()=>window.removeEventListener("resize",handler);
  },[]);
  const total   = rows.length;
  const done    = rows.filter(r=>r.progress===6).length;
  const delayed = rows.filter(r=>r.status==="지연").length;
  const urgCnt  = rows.filter(r=>r.progress<6&&r.완수일&&diffDays(r.완수일)<=7).length;

  const adminTabs=[
    {icon:"▦",  label:"전체 현황"},
    {icon:"📅", label:"일정 관리"},
    {icon:"🚨", label:"긴급 보고서"},
    {icon:"🏫", label:"현장 관리"},
    {icon:"💰", label:"매출 현황", adminOnly:true},
    {icon:"💬", label:"팀 채팅"},
    {icon:"⚙️", label:"설정",     adminOnly:true},
  ];
  const memberTabs=[
    {icon:"▦",  label:"전체 현황"},
    {icon:"📅", label:"일정 관리"},
    {icon:"🚨", label:"긴급 보고서"},
    {icon:"🏫", label:"현장 관리"},
    {icon:"💬", label:"팀 채팅"},
  ];
  const sideItems = isAdmin ? adminTabs : memberTabs;

  if(!ready) return(
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:48}}>🏫</div>
      <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>현장조사팀 대시보드</div>
      <div style={{fontSize:13,color:"#64748b"}}>Firebase 연결 중...</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{width:36,height:36,border:"3px solid #334155",borderTopColor:"#3b82f6",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    </div>
  );

  if(!user) return <Login onLogin={u=>{setUser(u);setTab("전체 현황");}} adminPw={adminPw} members={members}/>;

  return(
    <div style={{display:"flex",height:"100vh",fontFamily:"'Apple SD Gothic Neo','Malgun Gothic',sans-serif",background:"#f8fafc",color:"#1e293b",position:"relative"}}>
      {isMobile&&sideOpen&&<div onClick={()=>setSideOpen(false)} style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.55)",zIndex:50}}/>}
      <div style={{width:210,background:"#0f172a",display:"flex",flexDirection:"column",padding:"26px 0",flexShrink:0,position:isMobile?"fixed":"relative",top:0,bottom:0,left:0,zIndex:60,transform:isMobile?(sideOpen?"translateX(0)":"translateX(-100%)"):"none",transition:"transform 0.25s ease",...(isMobile?{}:(sideOpen?{}:{marginLeft:-210}))}}>
        <div style={{padding:"0 20px 18px",borderBottom:"1px solid #1e293b"}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:3}}>TEAM DASHBOARD</div>
          <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>현장조사팀</div>
          <div style={{marginTop:8,display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:isAdmin?"#f97316":MC[user.name]||"#1d4ed8",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>{user.name[0]}</div>
            <div><div style={{fontSize:11,color:"#fff",fontWeight:600}}>{user.name}</div><div style={{fontSize:9,color:isAdmin?"#fb923c":"#22c55e"}}>{isAdmin?"🔐 관리자":"● 팀원"}</div></div>
          </div>
        </div>
        <div style={{padding:"12px 10px",flex:1}}>
          {sideItems.map(item=>(
            <div key={item.label} onClick={()=>{setTab(item.label);if(isMobile)setSideOpen(false);}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,cursor:"pointer",marginBottom:3,
                background:tab===item.label?"#1e40af":"transparent",
                color:tab===item.label?"#fff":item.adminOnly?"#fb923c":"#94a3b8",
                fontWeight:tab===item.label?700:400,fontSize:13}}>
              <span>{item.icon}</span>{item.label}
              {item.label==="긴급 보고서"&&urgCnt>0&&<span style={{marginLeft:"auto",background:"#ef4444",color:"#fff",borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:700}}>{urgCnt}</span>}
              {item.adminOnly&&<span style={{marginLeft:"auto",fontSize:9,background:"rgba(249,115,22,.2)",color:"#fb923c",borderRadius:4,padding:"1px 5px"}}>관리자</span>}
            </div>
          ))}
        </div>
        <div style={{padding:"12px 14px",borderTop:"1px solid #1e293b"}}>
          <button onClick={()=>{setUser(null);setTab("전체 현황");}} style={{width:"100%",padding:"7px",borderRadius:8,border:"1px solid #334155",background:"transparent",color:"#64748b",fontSize:12,cursor:"pointer"}}>로그아웃</button>
        </div>
      </div>

      <div ref={mainRef} onScroll={e=>setShowTop(e.target.scrollTop>300)}
        style={{flex:1,overflow:"auto",padding:isMobile?"16px 16px":"24px 28px",position:"relative"}}>
        {/* 맨 위로 버튼 */}
        {showTop&&<button onClick={()=>mainRef.current.scrollTo({top:0,behavior:"smooth"})}
          style={{position:"fixed",bottom:28,right:24,width:44,height:44,borderRadius:"50%",
            background:"#1d4ed8",color:"#fff",border:"none",fontSize:20,cursor:"pointer",
            boxShadow:"0 4px 14px rgba(29,78,216,0.4)",zIndex:40,display:"flex",alignItems:"center",justifyContent:"center",
            lineHeight:1}}>↑</button>}
        <div style={{marginBottom:20,display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>setSideOpen(!sideOpen)} aria-label="메뉴"
            style={{width:38,height:38,borderRadius:10,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,position:"relative",padding:0}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f172a" strokeWidth="2.2" strokeLinecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="14" y2="17"/></svg>
            {urgCnt>0&&!sideOpen&&<span style={{position:"absolute",top:-5,right:-5,background:"#ef4444",color:"#fff",fontSize:10,fontWeight:700,minWidth:18,height:18,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 5px",border:"2px solid #f8fafc"}}>{urgCnt}</span>}
          </button>
          <div style={{minWidth:0,flex:1}}>
            <h1 style={{fontSize:18,fontWeight:700,margin:0}}>{tab}</h1>
            <p style={{fontSize:11,color:"#64748b",margin:"3px 0 0"}}>현장조사팀 · 실시간 공유 중 🟢</p>
          </div>
        </div>

        {tab==="전체 현황" && <Overview rows={rows} total={total} done={done} urgCnt={urgCnt} delayed={delayed}/>}

        {tab==="일정 관리"   && <Calendar rows={rows}/>}
        {tab==="긴급 보고서" && <UrgentReport rows={rows} setRows={setRows}/>}
        {tab==="현장 관리"   && <SiteManager rows={rows} setRows={setRows} members={members} isAdmin={isAdmin}/>}
        {tab==="팀 채팅"     && <Chat user={user} members={members}/>}
        {tab==="매출 현황"   && isAdmin && <Revenue rows={rows} setRows={setRows}/>}
        {tab==="설정"        && isAdmin && <Settings adminPw={adminPw} setAdminPw={setAdminPw} members={members} setMembers={setMembers}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
