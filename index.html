};

const PBar = ({step, compact}) => {
  const t = 6;
  if(compact) return (
    <div style={{minWidth:130}}>

  );

    <div style={{display:"flex"}}>

            <div style={{textAlign:"left"}}><div>관리자 로그인</div><div style={{fontSize:12,fontWeight:400,color:"#93c5fd",marginTop:2}}>매출·팀원관리 포함 전체 접근</div></div>

            <div style={{width:44,height:44,borderRadius:"50%",background:"#334155",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>👤</div>

/* ── 설정 ── */
function SettingsPanel({adminPw,setAdminPw,members,setMembers}) {
  const [pwForm,setPwForm]=useState({cur:"",next:"",confirm:""});
  const [pwMsg,setPwMsg]=useState(null);
  const [memList,setMemList]=useState([...members]);
  const [newMem,setNewMem]=useState("");
  const [memMsg,setMemMsg]=useState(null);
  const [editIdx,setEditIdx]=useState(null);
  const [editVal,setEditVal]=useState("");

  const savePw=()=>{
    if(pwForm.cur!==adminPw){setPwMsg({type:"err",text:"현재 비밀번호가 틀렸습니다."});return;}
    if(pwForm.next.length<4){setPwMsg({type:"err",text:"새 비밀번호는 4자 이상이어야 합니다."});return;}
    if(pwForm.next!==pwForm.confirm){setPwMsg({type:"err",text:"새 비밀번호가 일치하지 않습니다."});return;}
    fbSetSettings("adminPw", pwForm.next);
    setAdminPw(pwForm.next);
    setPwForm({cur:"",next:"",confirm:""});
    setPwMsg({type:"ok",text:"✅ 비밀번호가 변경됐습니다."});
    setTimeout(()=>setPwMsg(null),3000);
  };
  const saveMembers=list=>{
    fbSetSettings("members", list);
    setMembers(list); setMemList(list);
    setMemMsg({type:"ok",text:"✅ 저장됐습니다."});
    setTimeout(()=>setMemMsg(null),3000);
  };
  const addMember=()=>{const n=newMem.trim();if(!n)return;if(memList.includes(n)){setMemMsg({type:"err",text:"이미 존재합니다."});return;}const u=[...memList,n];setMemList(u);setNewMem("");saveMembers(u);};
  const removeMember=idx=>{const u=memList.filter((_,i)=>i!==idx);setMemList(u);saveMembers(u);};
  const saveEdit=idx=>{const n=editVal.trim();if(!n)return;const u=memList.map((m,i)=>i===idx?n:m);setMemList(u);setEditIdx(null);setEditVal("");saveMembers(u);};

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20,maxWidth:600}}>
      <div style={{background:"#eff6ff",borderRadius:12,padding:"12px 18px",border:"1px solid #bfdbfe",fontSize:13,color:"#1d4ed8"}}>🔐 <strong>관리자 전용 설정</strong> — 변경 사항은 팀 전체에 실시간 반영됩니다.</div>
      {/* 비번 */}
      <div style={{background:"#fff",borderRadius:16,boxShadow:"0 1px 4px rgba(0,0,0,.07)",overflow:"hidden"}}>
        <div style={{padding:"16px 22px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:20}}>🔑</span><div><div style={{fontWeight:700,fontSize:15}}>관리자 비밀번호 변경</div></div></div>
        <div style={{padding:"20px 22px",display:"flex",flexDirection:"column",gap:12}}>
          {[["현재 비밀번호","cur"],["새 비밀번호","next"],["새 비밀번호 확인","confirm"]].map(([label,key])=>(
            <div key={key}><label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:5}}>{label}</label>
            <input type="password" value={pwForm[key]} onChange={e=>setPwForm(f=>({...f,[key]:e.target.value}))} placeholder={label}
              style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:9,padding:"10px 14px",fontSize:13,boxSizing:"border-box",outline:"none"}}/></div>
          ))}
          {pwMsg&&<div style={{padding:"8px 12px",borderRadius:8,background:pwMsg.type==="ok"?"#f0fdf4":"#fef2f2",color:pwMsg.type==="ok"?"#16a34a":"#dc2626",fontSize:12}}>{pwMsg.text}</div>}
          <button onClick={savePw} style={{padding:"11px",borderRadius:10,border:"none",background:"#1d4ed8",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>비밀번호 변경</button>
        </div>
      </div>
      {/* 팀원 */}
      <div style={{background:"#fff",borderRadius:16,boxShadow:"0 1px 4px rgba(0,0,0,.07)",overflow:"hidden"}}>
        <div style={{padding:"16px 22px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:20}}>👥</span><div><div style={{fontWeight:700,fontSize:15}}>팀원 이름 관리</div><div style={{fontSize:12,color:"#64748b",marginTop:1}}>변경하면 팀 전체에 바로 반영됩니다</div></div></div>
        <div style={{padding:"20px 22px"}}>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
            {memList.map((m,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0"}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:mColor(m,i),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15,flexShrink:0}}>{m[0]}</div>
                {editIdx===i?(
                  <div style={{display:"flex",gap:6,flex:1,alignItems:"center"}}>
                    <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEdit(i);if(e.key==="Escape")setEditIdx(null);}}
                      style={{flex:1,border:"2px solid #1d4ed8",borderRadius:7,padding:"6px 10px",fontSize:13,outline:"none"}}/>
                    <button onClick={()=>saveEdit(i)} style={{padding:"6px 12px",borderRadius:7,border:"none",background:"#1d4ed8",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>저장</button>
                    <button onClick={()=>setEditIdx(null)} style={{padding:"6px 10px",borderRadius:7,border:"1px solid #e5e7eb",background:"#fff",fontSize:12,cursor:"pointer"}}>취소</button>
                  </div>
                ):(
                  <><span style={{flex:1,fontWeight:600,fontSize:14}}>{m}</span>
                  <button onClick={()=>{setEditIdx(i);setEditVal(m);}} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #e2e8f0",background:"#fff",fontSize:11,cursor:"pointer"}}>✏️ 수정</button>
                  <button onClick={()=>removeMember(i)} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #fca5a5",background:"#fff1f2",fontSize:11,cursor:"pointer",color:"#dc2626"}}>🗑 삭제</button></>
                )}

          </div>
        </div>
      </div>
    </div>
  );
}

              </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  {[["담당 건수",myRows.length+"건","#1d4ed8"],["완료",done+"건","#16a34a"],["지연",delayed+"건","#dc2626"],["담당 금액",won(totalAmt),"#7c3aed"]].map(([l,v,c])=>(
                    <div key={l} style={{background:"#f8fafc",borderRadius:10,padding:"10px 12px"}}><div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>{l}</div><div style={{fontSize:14,fontWeight:800,color:c}}>{v}</div></div>
                  ))}

                  {myRows.map(r=><div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,fontSize:12}}>

/* ── 매출 현황 ── */
function RevenueView({rows,setRows}) {
  const [editId,setEditId]=useState(null);
  const [editVal,setEditVal]=useState("");
  const total=rows.reduce((s,r)=>s+(r.계약금액||0),0);
  const completed=rows.filter(r=>r.progress===6).reduce((s,r)=>s+(r.계약금액||0),0);
  const inProgress=rows.filter(r=>r.progress>0&&r.progress<6).reduce((s,r)=>s+(r.계약금액||0),0);
  const notStarted=rows.filter(r=>r.progress===0).reduce((s,r)=>s+(r.계약금액||0),0);
  const noAmount=rows.filter(r=>!r.계약금액).length;
  const pct=(v,t)=>t>0?Math.round(v/t*100):0;
  const byType={};
  rows.forEach(r=>{if(!byType[r.점검종류])byType[r.점검종류]={count:0,amount:0};byType[r.점검종류].count++;byType[r.점검종류].amount+=(r.계약금액||0);});
  const typeColors=["#3b82f6","#8b5cf6","#f59e0b","#10b981","#ef4444","#06b6d4"];
  const saveEdit=id=>{
    const n=parseInt(editVal.replace(/,/g,""))||0;
    const updated=rows.map(row=>row.id===id?{...row,계약금액:n}:row);
    setRows(updated); fbSetRows(updated); setEditId(null); setEditVal("");
  };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{background:"#eff6ff",borderRadius:10,padding:"10px 16px",border:"1px solid #bfdbfe",fontSize:12,color:"#1d4ed8"}}>🔐 <strong>관리자 전용</strong> — 계약 금액 및 매출 현황</div>
      {noAmount>0&&<div style={{background:"#fff7ed",borderRadius:10,padding:"10px 16px",border:"1px solid #fed7aa",fontSize:12,color:"#c2410c"}}>⚠️ 금액 미입력 <strong>{noAmount}건</strong></div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
        {[{l:"총 계약금액",v:total,c:"#1d4ed8",icon:"💰"},{l:"납품 완료",v:completed,c:"#16a34a",icon:"✅"},{l:"진행중",v:inProgress,c:"#7c3aed",icon:"🔄"},{l:"미착수",v:notStarted,c:"#94a3b8",icon:"⏳"}].map(k=>(
          <div key={k.l} style={{background:"#fff",borderRadius:14,padding:"18px 20px",boxShadow:"0 1px 4px rgba(0,0,0,.07)",borderTop:`3px solid ${k.c}`}}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>{k.icon} {k.l}</div>
            <div style={{fontSize:20,fontWeight:800,color:k.c,marginBottom:4}}>{won(k.v)}</div>
            {total>0&&<><div style={{height:4,background:"#f1f5f9",borderRadius:2}}><div style={{height:4,background:k.c,borderRadius:2,width:`${pct(k.v,total)}%`}}/></div><div style={{fontSize:10,color:"#94a3b8",marginTop:3}}>{pct(k.v,total)}%</div></>}
          </div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",padding:"18px 20px"}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>📊 점검종류별 금액</div>
        {Object.entries(byType).sort((a,b)=>b[1].amount-a[1].amount).map(([type,d],i)=>(
          <div key={type} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,fontWeight:600}}>{type}</span><div><span style={{fontSize:13,fontWeight:700,color:typeColors[i%typeColors.length]}}>{won(d.amount)}</span><span style={{fontSize:10,color:"#94a3b8",marginLeft:6}}>{d.count}건</span></div></div>
            <div style={{height:6,background:"#f1f5f9",borderRadius:3}}><div style={{height:6,background:typeColors[i%typeColors.length],borderRadius:3,width:`${pct(d.amount,total)}%`}}/></div>
          </div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",overflow:"hidden"}}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:700,fontSize:14}}>📋 현장별 계약금액</span><span style={{fontSize:12,color:"#64748b"}}>클릭하여 수정</span></div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#f8fafc"}}>{["No.","학교명","시설명","담당","완수일","진행","계약금액"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",color:"#64748b",fontWeight:600,fontSize:11,whiteSpace:"nowrap",borderBottom:"2px solid #e2e8f0"}}>{h}</th>)}</tr></thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={r.id} style={{borderBottom:"1px solid #f1f5f9",background:i%2?"#fafafa":"#fff"}}>
                <td style={{padding:"10px 14px",color:"#94a3b8"}}>{r.no}</td>
                <td style={{padding:"10px 14px",fontWeight:600}}>{r.학교명}</td>
                <td style={{padding:"10px 14px",color:"#64748b"}}>{r.시설명}</td>
                <td style={{padding:"10px 14px"}}>{r.lead?<div style={{display:"flex",alignItems:"center",gap:5}}><Av name={r.lead} size={20}/><span>{r.lead}</span></div>:"-"}</td>
                <td style={{padding:"10px 14px",color:"#ea580c",whiteSpace:"nowrap"}}>{r.완수일||"-"}</td>
                <td style={{padding:"10px 14px",minWidth:130}}><PBar step={r.progress||0} compact/></td>
                <td style={{padding:"10px 14px",minWidth:150}}>
                  {editId===r.id?(
                    <div style={{display:"flex",gap:5,alignItems:"center"}}>
                      <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEdit(r.id);if(e.key==="Escape")setEditId(null);}}
                        style={{width:110,border:"2px solid #1d4ed8",borderRadius:6,padding:"5px 8px",fontSize:12,outline:"none"}}/>
                      <button onClick={()=>saveEdit(r.id)} style={{padding:"4px 8px",borderRadius:6,border:"none",background:"#1d4ed8",color:"#fff",fontSize:11,cursor:"pointer"}}>✓</button>
                      <button onClick={()=>setEditId(null)} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #e5e7eb",background:"#fff",fontSize:11,cursor:"pointer"}}>✕</button>
                    </div>
                  ):(
                    <div onClick={()=>{setEditId(r.id);setEditVal(r.계약금액?String(r.계약금액):"");}}
                      style={{cursor:"pointer",padding:"6px 10px",borderRadius:8,border:"1px dashed",borderColor:r.계약금액?"#e2e8f0":"#fca5a5",background:r.계약금액?"#f8fafc":"#fff1f2",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontWeight:700,color:r.계약금액?"#1d4ed8":"#f87171",fontSize:13}}>{r.계약금액?won(r.계약금액):"금액 입력"}</span>
                      <span style={{fontSize:10,color:"#94a3b8"}}>✏️</span>
                    </div>
                  )}
                </td>
              </tr>
            ))}
            <tr style={{background:"#0f172a",color:"#fff",fontWeight:700}}><td colSpan={6} style={{padding:"12px 14px",fontSize:13}}>합계</td><td style={{padding:"12px 14px",fontSize:15,fontWeight:800,color:"#fbbf24"}}>{won(total)}</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── 현장 관리 ── */
function SiteManager({rows,setRows,isAdmin,members}) {
  const fileRef=useRef();
  const [preview,setPreview]=useState(null);
  const [schedModal,setSchedModal]=useState(null);
  const [detailModal,setDetailModal]=useState(null);
  const [filter,setFilter]=useState("전체");
  const [search,setSearch]=useState("");
  const [colFilters,setColFilters]=useState({});
  const [openDD,setOpenDD]=useState(null);
  const [dropSearch,setDropSearch]=useState("");
  const [sForm,setSForm]=useState({lead:members[0]||"",status:"예정"});

  const filterCols=["점검종류","지역","학교명","납품방법"];
  const uniqueVals=col=>[...new Set(rows.map(r=>r[col]).filter(Boolean))].sort();
  const isFiltered=col=>colFilters[col]&&colFilters[col].size>0;
  const toggleCol=(col,val)=>setColFilters(prev=>{const s=new Set(prev[col]||[]);s.has(val)?s.delete(val):s.add(val);return{...prev,[col]:s};});
  const clearCol=col=>setColFilters(prev=>({...prev,[col]:new Set()}));

  const updateRows = updated => { setRows(updated); fbSetRows(updated); };

  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{try{const wb=XLSX.read(ev.target.result,{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];const data=XLSX.utils.sheet_to_json(ws,{defval:""});
      setPreview({rows:data.map((r,i)=>({id:`up_${Date.now()}_${i}`,no:r["No."]||i+1,점검종류:r["점검종류"]||"",지역:r["지역"]||"",학교명:r["학교명"]||"",시설명:r["시설명"]||"",동수:parseInt(r["동수"])||0,연면적:parseFloat(r["연면적(m²)"]||r["연면적"])||0,현장조사:r["현장조사"]||"",착수일:r["착수일"]||"",완수일:r["완수일"]||"",FMS:r["FMS 아이디/비번"]||r["FMS"]||"",특기사항:r["특기사항"]||"",납품방법:r["납품방법"]||"현장납품",lead:members[0]||"",progress:0,status:"예정",계약금액:0,현장참여:[]})).filter(r=>r.학교명)});
    }catch(err){console.error(err);}};
    reader.readAsArrayBuffer(file);e.target.value="";
  };

  const unscheduled=rows.filter(r=>!r.현장조사&&!r.착수일).length;
  const filtered=rows.filter(r=>{
    if(filter==="미배정"&&(r.현장조사||r.착수일))return false;
    if(filter==="배정완료"&&!r.현장조사&&!r.착수일)return false;
    if(search&&!`${r.학교명}${r.시설명}${r.지역}`.includes(search))return false;
    for(const col of filterCols){const s=colFilters[col];if(s&&s.size>0&&!s.has(r[col]))return false;}
    return true;
  });
  const activeFC=filterCols.filter(c=>isFiltered(c)).length;

  const colHeaders=[
    {key:"no",label:"No."},{key:"점검종류",label:"점검종류",f:true},{key:"지역",label:"지역",f:true},
    {key:"학교명",label:"학교명",f:true},{key:"시설명",label:"시설명"},{key:"동수",label:"동수"},
    {key:"연면적",label:"연면적(㎡)"},{key:"현장조사",label:"현장조사"},{key:"착수일",label:"착수일"},
    {key:"완수일",label:"완수일"},{key:"출력기간",label:"출력기간"},{key:"FMS",label:"FMS"},
    {key:"특기사항",label:"특기사항"},{key:"납품방법",label:"납품방법",f:true},
    {key:"lead",label:"담당"},{key:"진행단계",label:"진행단계"},{key:"상태",label:"상태"},
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}} onClick={()=>setOpenDD(null)}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:260}}>
          <div style={{position:"relative",flex:1,maxWidth:320}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#94a3b8"}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="학교명, 시설명, 지역 검색..."
              style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:10,padding:"9px 12px 9px 34px",fontSize:13,boxSizing:"border-box",outline:"none"}}/>
            {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16}}>✕</button>}
          </div>
          <div style={{display:"flex",gap:6}}>
            {[["전체",rows.length],["미배정",unscheduled],["배정완료",rows.length-unscheduled]].map(([l,n])=>(
              <button key={l} onClick={e=>{e.stopPropagation();setFilter(l);}} style={{padding:"7px 12px",borderRadius:20,border:"1px solid",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",borderColor:filter===l?"#1d4ed8":"#e5e7eb",background:filter===l?"#1d4ed8":"#fff",color:filter===l?"#fff":"#6b7280"}}>{l} {n}</button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {activeFC>0&&<button onClick={()=>setColFilters({})} style={{padding:"7px 12px",borderRadius:8,border:"1px solid #fca5a5",background:"#fff1f2",color:"#dc2626",fontSize:12,cursor:"pointer",fontWeight:600}}>필터 초기화 ({activeFC})</button>}
          {isAdmin&&<button onClick={()=>fileRef.current.click()} style={{padding:"7px 14px",borderRadius:8,border:"none",background:"#1d4ed8",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>📤 엑셀 업로드</button>}
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:"none"}}/>
        </div>
      </div>
      <div style={{fontSize:12,color:"#64748b"}}>전체 {rows.length}건 중 <strong style={{color:"#1d4ed8"}}>{filtered.length}건</strong> 표시</div>
      {unscheduled>0&&<div style={{background:"#fff7ed",borderRadius:10,padding:"8px 14px",border:"1px solid #fed7aa",fontSize:12,color:"#c2410c"}}>⚠️ 일정 미배정 <strong>{unscheduled}건</strong></div>}

      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",overflow:"auto",position:"relative"}} onClick={e=>e.stopPropagation()}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:1200}}>
          <thead><tr style={{background:"#0f172a",color:"#fff"}}>
            {colHeaders.map(h=>(
              <th key={h.key} style={{padding:0,textAlign:"left",fontWeight:600,fontSize:10,whiteSpace:"nowrap",borderRight:"1px solid #1e293b",position:"relative"}}>
                {h.f?(
                  <button onClick={e=>{e.stopPropagation();setOpenDD(openDD===h.key?null:h.key);setDropSearch("");}} style={{width:"100%",padding:"10px",background:"none",border:"none",cursor:"pointer",color:"#fff",display:"flex",alignItems:"center",gap:5,fontWeight:600,fontSize:10,textAlign:"left"}}>
                    {h.label}<span style={{marginLeft:"auto",fontSize:9,background:isFiltered(h.key)?"#f97316":"rgba(255,255,255,.15)",borderRadius:4,padding:"1px 5px",flexShrink:0}}>{isFiltered(h.key)?`${colFilters[h.key].size}✓`:"▼"}</span>
                  </button>
                ):<div style={{padding:"10px"}}>{h.label}</div>}
                {h.f&&openDD===h.key&&(
                  <div style={{position:"absolute",top:"100%",left:0,zIndex:1000,background:"#fff",border:"1px solid #e5e7eb",borderRadius:10,boxShadow:"0 8px 24px rgba(0,0,0,.15)",minWidth:180,color:"#1e293b"}}>
                    <div style={{padding:"8px 10px",borderBottom:"1px solid #f1f5f9"}}><input value={dropSearch} onChange={e=>setDropSearch(e.target.value)} placeholder="검색..." style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:6,padding:"5px 8px",fontSize:11,boxSizing:"border-box"}} autoFocus/></div>
                    <div style={{padding:"4px 0",maxHeight:200,overflowY:"auto"}}>
                      <button onClick={()=>clearCol(h.key)} style={{width:"100%",padding:"6px 12px",background:"none",border:"none",cursor:"pointer",textAlign:"left",fontSize:11,color:"#94a3b8",display:"flex",alignItems:"center",gap:6}}><span style={{width:14,height:14,border:"1px solid #d1d5db",borderRadius:3,display:"inline-block"}}/>전체 해제</button>
                      {uniqueVals(h.key).filter(v=>!dropSearch||v.includes(dropSearch)).map(v=>{
                        const checked=colFilters[h.key]&&colFilters[h.key].has(v);

              <tbody>{preview.rows.map((r,i)=><tr key={r.id} style={{borderBottom:"1px solid #f1f5f9",background:i%2?"#fafafa":"#fff"}}>
                <td style={{padding:"7px 10px",color:"#94a3b8"}}>{r.no}</td>
                <td style={{padding:"7px 10px"}}><span style={{background:"#ede9fe",color:"#7c3aed",borderRadius:20,padding:"2px 7px",fontSize:10,fontWeight:600}}>{r.점검종류||"-"}</span></td>

                <td style={{padding:"7px 10px",fontWeight:700}}>{r.학교명||"-"}</td>
                <td style={{padding:"7px 10px",color:"#475569"}}>{r.시설명||"-"}</td>

                <td style={{padding:"7px 10px",textAlign:"right"}}>{r.연면적?r.연면적.toLocaleString():"-"}</td>
                <td style={{padding:"7px 10px",color:"#1d4ed8"}}>{r.현장조사||"-"}</td>
                <td style={{padding:"7px 10px"}}>{r.착수일||"-"}</td>
                <td style={{padding:"7px 10px",color:"#ea580c",fontWeight:600}}>{r.완수일||"-"}</td>
                <td style={{padding:"7px 10px"}}>{r.특기사항?<span style={{background:"#fff7ed",color:"#92400e",borderRadius:4,padding:"1px 5px",fontSize:10}}>{r.특기사항}</span>:"-"}</td>
                <td style={{padding:"7px 10px",fontSize:11,fontWeight:600,color:r.납품방법==="현장납품"?"#1d4ed8":"#7c3aed"}}>{r.납품방법==="현장납품"?"🏫":"📦"} {r.납품방법}</td>
              </tr>)}</tbody>
            </table></div>
          </div>
        </div>
      )}

      {/* 일정 배정 모달 */}
      {schedModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#fff",borderRadius:16,padding:"26px 30px",width:460,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
            <h2 style={{margin:"0 0 14px",fontSize:16,fontWeight:700}}>일정 배정</h2>
            <div style={{background:"#f8fafc",borderRadius:10,padding:"12px 14px",marginBottom:16,border:"1px solid #e2e8f0"}}><div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{schedModal.학교명} · {schedModal.시설명}</div>{schedModal.특기사항&&<div style={{marginTop:6,background:"#fff7ed",borderRadius:6,padding:"4px 8px",fontSize:11,color:"#92400e"}}>⚠️ {schedModal.특기사항}</div>}</div>
            {[["현장조사일 *","현장조사"],["착수일","착수일"],["완수일 *","완수일"]].map(([l,k])=>(
              <div key={k} style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>{l}</label><input type="date" defaultValue={schedModal[k]||""} onChange={e=>setSForm(f=>({...f,[k]:e.target.value}))} style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:13,boxSizing:"border-box"}}/></div>
            ))}
            <div style={{marginBottom:16}}><label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>주요 담당자</label><select value={sForm.lead} onChange={e=>setSForm(f=>({...f,lead:e.target.value}))} style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:13,background:"#fff"}}>{members.map(m=><option key={m}>{m}</option>)}</select></div>

              <button onClick={()=>{const updated=rows.map(row=>row.id===schedModal.id?{...row,...sForm}:row);updateRows(updated);setSchedModal(null);}} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#1d4ed8",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>배정 완료</button>
            </div>
          </div>
        </div>

      {/* 상세 모달 */}
      {detailModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#fff",borderRadius:16,padding:"26px 30px",width:460,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><h2 style={{margin:0,fontSize:16,fontWeight:700}}>{detailModal.학교명}</h2><button onClick={()=>setDetailModal(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#94a3b8"}}>✕</button></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>

                <div key={l} style={{background:"#f8fafc",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{l}</div><div style={{fontSize:13,fontWeight:600}}>{v}</div></div>

            <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>보고서 진행 단계</div>

/* ── 캘린더 ── */
function CalendarView({rows,setRows,members}) {
  const [yr,setYr]=useState(TODAY.getFullYear());
  const [mo,setMo]=useState(TODAY.getMonth());
  const [sel,setSel]=useState(null);
  const [attendModal,setAttendModal]=useState(null);

  const toggleAttend=(rowId,name)=>{
    const updated=rows.map(r=>{if(r.id!==rowId)return r;const cur=r.현장참여||[];const next=cur.includes(name)?cur.filter(n=>n!==name):[...cur,name];return{...r,현장참여:next};});
    setRows(updated); fbSetRows(updated);
    setAttendModal(prev=>prev&&prev.id===rowId?updated.find(x=>x.id===rowId):prev);
  };

  const first=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  const weeks=[];let d=1-first;
  while(d<=dim){const w=[];for(let i=0;i<7;i++,d++)w.push(d>0&&d<=dim?d:null);weeks.push(w);}
  const evMap={};
  rows.forEach(r=>{
    if(r.현장조사){const dd=new Date(r.현장조사);if(dd.getFullYear()===yr&&dd.getMonth()===mo){const k=dd.getDate();if(!evMap[k])evMap[k]={s:[],r:[]};evMap[k].s.push(r);}}
    if(r.완수일){const dd=new Date(r.완수일);if(dd.getFullYear()===yr&&dd.getMonth()===mo){const k=dd.getDate();if(!evMap[k])evMap[k]={s:[],r:[]};evMap[k].r.push(r);}}
  });
  const mn=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const dn=["일","월","화","수","목","금","토"];
  const pM=()=>{mo===0?(setMo(11),setYr(y=>y-1)):setMo(m=>m-1);setSel(null);};
  const nM=()=>{mo===11?(setMo(0),setYr(y=>y+1)):setMo(m=>m+1);setSel(null);};
  const sev=sel?evMap[sel]||{s:[],r:[]}:{s:[],r:[]};

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:18}}>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:"1px solid #f1f5f9"}}>
          <button onClick={pM} style={{background:"none",border:"1px solid #e5e7eb",borderRadius:8,padding:"6px 14px",cursor:"pointer"}}>‹</button>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
            <span style={{fontWeight:700,fontSize:15}}>{yr}년 {mn[mo]}</span>
            <div style={{display:"flex",gap:14,fontSize:11}}>
              <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:"#3b82f6",display:"inline-block"}}/>현장조사일</span>
              <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:"#f97316",display:"inline-block"}}/>보고서완수일</span>
            </div>
          </div>
          <button onClick={nM} style={{background:"none",border:"1px solid #e5e7eb",borderRadius:8,padding:"6px 14px",cursor:"pointer"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"1px solid #f1f5f9"}}>
          {dn.map((d,i)=><div key={d} style={{textAlign:"center",padding:"9px 0",fontSize:12,fontWeight:600,color:i===0?"#ef4444":i===6?"#3b82f6":"#64748b"}}>{d}</div>)}
        </div>
        {weeks.map((wk,wi)=>(
          <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:wi<weeks.length-1?"1px solid #f1f5f9":"none"}}>
            {wk.map((d,di)=>{
              const isT=d&&yr===TODAY.getFullYear()&&mo===TODAY.getMonth()&&d===TODAY.getDate();
              const ev=d?evMap[d]||{s:[],r:[]}:{s:[],r:[]};
              return <div key={di} onClick={()=>d&&setSel(d===sel?null:d)} style={{minHeight:84,padding:"6px 5px",borderLeft:di>0?"1px solid #f1f5f9":"none",background:d===sel?"#eff6ff":"transparent",cursor:d?"pointer":"default"}}>
                {d&&<>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                    <div style={{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:isT?"#1d4ed8":"transparent",color:isT?"#fff":di===0?"#ef4444":di===6?"#3b82f6":"#1e293b",fontSize:12,fontWeight:isT?700:400}}>{d}</div>
                    <div style={{display:"flex",gap:2}}>{ev.s.length>0&&<div style={{width:7,height:7,borderRadius:"50%",background:"#3b82f6"}}/>}{ev.r.length>0&&<div style={{width:7,height:7,borderRadius:"50%",background:"#f97316"}}/>}</div>
                  </div>
                  {ev.s.slice(0,1).map(r=><div key={`s${r.id}`} style={{fontSize:9,padding:"2px 4px",borderRadius:3,background:"#dbeafe",color:"#1d4ed8",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:1}}>🔵 {r.학교명}</div>)}
                  {ev.r.slice(0,1).map(r=><div key={`r${r.id}`} style={{fontSize:9,padding:"2px 4px",borderRadius:3,background:"#ffedd5",color:"#c2410c",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:1}}>🟠 {r.학교명}</div>)}
                  {(ev.s.length+ev.r.length)>2&&<div style={{fontSize:9,color:"#94a3b8"}}>+{ev.s.length+ev.r.length-2}</div>}
                </>}
              </div>;
            })}
          </div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",padding:18,overflowY:"auto"}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>{sel?`${mo+1}월 ${sel}일`:"날짜 클릭"}</div>
        {!sel&&<div style={{color:"#94a3b8",fontSize:12,textAlign:"center",marginTop:36}}>날짜를 선택하세요</div>}
        {sel&&sev.s.length===0&&sev.r.length===0&&<div style={{color:"#94a3b8",fontSize:12,textAlign:"center",marginTop:36}}>일정 없음</div>}
        {sev.s.map(r=>{
          const attend=r.현장참여||[];
          return <div key={r.id} style={{background:"#eff6ff",borderRadius:8,padding:"10px 12px",marginBottom:8,borderLeft:"3px solid #3b82f6"}}>
            <div style={{fontSize:11,color:"#3b82f6",fontWeight:700,marginBottom:3}}>🔵 현장조사</div>
            <div style={{fontWeight:600,fontSize:12,marginBottom:6}}>{r.학교명} · {r.시설명}</div>
            <div style={{fontSize:10,color:"#94a3b8",marginBottom:4}}>주요 담당자</div>
            {r.lead&&<div style={{display:"flex",alignItems:"center",gap:5,marginBottom:8}}><Av name={r.lead} size={18}/><span style={{fontSize:11,fontWeight:600}}>{r.lead}</span></div>}
            <div style={{fontSize:10,color:"#94a3b8",marginBottom:6}}>현장 참여 인원 ({attend.length}명)</div>

          <div style={{fontSize:11,color:r.납품방법==="현장납품"?"#1d4ed8":"#7c3aed",marginTop:3}}>{r.납품방법==="현장납품"?"🏫 현장납품":"📦 택배납품"}</div>
          <div style={{marginTop:6}}><PBar step={r.progress||0} compact/></div>

            <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>{attendModal.학교명} · {attendModal.현장조사}</div>

              {members.map((m,i)=>{
                const cur=(rows.find(x=>x.id===attendModal.id)?.현장참여)||[];
                const checked=cur.includes(m);
                return <button key={m} onClick={()=>toggleAttend(attendModal.id,m)}
                  style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,border:`2px solid ${checked?"#1d4ed8":"#e5e7eb"}`,background:checked?"#eff6ff":"#fff",cursor:"pointer",textAlign:"left"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:mColor(m,i),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14}}>{m[0]}</div>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:checked?"#1d4ed8":"#374151"}}>{m}</div>{m===attendModal.lead&&<div style={{fontSize:10,color:"#f97316"}}>주요 담당자</div>}</div>
                  <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${checked?"#1d4ed8":"#d1d5db"}`,background:checked?"#1d4ed8":"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",flexShrink:0}}>{checked?"✓":""}</div>

        </div>
      )}

  );
}

/* ── 팀 채팅 (Firebase 실시간) ── */
function TeamChat({user, members}) {
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [activeRoom,setActiveRoom]=useState("전체");
  const bottomRef=useRef();
  const rooms=["전체","현장조사","보고서작성","공지사항"];
  const roomColors={전체:"#1d4ed8",현장조사:"#16a34a",보고서작성:"#7c3aed",공지사항:"#dc2626"};

  useEffect(()=>{
    const ref=db.ref(`chat/${activeRoom}`);
    ref.on("value", snap=>{
      const data=snap.val();
      if(data){
        const msgs=Object.values(data).sort((a,b)=>a.id-b.id);
        setMessages(msgs);
      } else {
        setMessages([]);
      }
    });
    return()=>ref.off();
  },[activeRoom]);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  const send=()=>{
    if(!input.trim())return;
    const msg={id:Date.now(),sender:user.name,text:input.trim(),room:activeRoom,time:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),date:new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric"})};
    db.ref(`chat/${activeRoom}/${msg.id}`).set(msg);
    setInput("");
  };

  const deleteMsg=id=>{
    db.ref(`chat/${activeRoom}/${id}`).remove();
  };

  const grouped=[];let lastDate=null;
  messages.forEach(m=>{if(m.date!==lastDate){grouped.push({type:"date",date:m.date});lastDate=m.date;}grouped.push({type:"msg",...m});});

  return (
    <div style={{display:"grid",gridTemplateColumns:"180px 1fr",gap:16,height:"calc(100vh - 160px)"}}>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",padding:14,display:"flex",flexDirection:"column",gap:6}}>
        <div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginBottom:6,padding:"0 4px"}}>채팅방</div>
        {rooms.map(r=><button key={r} onClick={()=>setActiveRoom(r)} style={{padding:"10px 12px",borderRadius:10,border:"none",cursor:"pointer",textAlign:"left",fontWeight:activeRoom===r?700:500,fontSize:13,background:activeRoom===r?`${roomColors[r]}18`:"transparent",color:activeRoom===r?roomColors[r]:"#475569",display:"flex",alignItems:"center",gap:8}}><span style={{width:8,height:8,borderRadius:"50%",background:roomColors[r],flexShrink:0}}/>{r}</button>)}
        <div style={{marginTop:"auto",padding:"10px 4px",borderTop:"1px solid #f1f5f9"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:MC[user.name]||"#1d4ed8",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13}}>{user.name[0]}</div>
            <div><div style={{fontSize:12,fontWeight:700}}>{user.name}</div><div style={{fontSize:10,color:user.role==="admin"?"#f97316":"#22c55e"}}>● {user.role==="admin"?"관리자":"팀원"} · 실시간</div></div>
          </div>
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:10,background:`${roomColors[activeRoom]}08`}}>
          <span style={{width:10,height:10,borderRadius:"50%",background:roomColors[activeRoom]}}/><span style={{fontWeight:700,fontSize:15}}>{activeRoom}</span>
          <span style={{fontSize:12,color:"#94a3b8",marginLeft:4}}>{messages.length}개 메시지</span>
          <span style={{marginLeft:"auto",fontSize:11,color:"#22c55e",background:"#f0fdf4",borderRadius:20,padding:"2px 10px",border:"1px solid #86efac"}}>🟢 실시간 연결됨</span>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:2,background:"#fafafa"}}>
          {grouped.length===0&&<div style={{textAlign:"center",marginTop:60,color:"#94a3b8"}}><div style={{fontSize:36,marginBottom:10}}>💬</div><div style={{fontSize:14,fontWeight:600}}>아직 메시지가 없어요</div><div style={{fontSize:12,marginTop:4}}>팀원과 대화를 시작해보세요!</div></div>}
          {grouped.map((item,i)=>{
            if(item.type==="date")return <div key={`d${i}`} style={{textAlign:"center",margin:"16px 0 8px"}}><span style={{background:"#e2e8f0",color:"#64748b",borderRadius:20,padding:"3px 14px",fontSize:11}}>{item.date}</span></div>;
            const isMe=item.sender===user.name, color=MC[item.sender]||"#94a3b8";
            return <div key={item.id} style={{display:"flex",flexDirection:isMe?"row-reverse":"row",gap:8,alignItems:"flex-end",marginBottom:6}}>
              {!isMe&&<div style={{width:30,height:30,borderRadius:"50%",background:color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>{item.sender[0]}</div>}
              <div style={{maxWidth:"65%"}}>
                {!isMe&&<div style={{fontSize:11,color:"#64748b",marginBottom:3,marginLeft:2}}>{item.sender}{item.sender==="관리자"&&<span style={{marginLeft:5,background:"#fff7ed",color:"#f97316",borderRadius:20,padding:"1px 7px",fontSize:10}}>관리자</span>}</div>}
                <div style={{display:"flex",alignItems:"flex-end",gap:6,flexDirection:isMe?"row-reverse":"row"}}>
                  <div style={{background:isMe?color:"#fff",color:isMe?"#fff":"#1e293b",borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"10px 14px",fontSize:13,lineHeight:1.5,boxShadow:"0 1px 3px rgba(0,0,0,.08)",wordBreak:"break-word"}}>{item.text}</div>
                  <div style={{fontSize:10,color:"#94a3b8",flexShrink:0}}>{item.time}</div>
                  {(isMe||user.role==="admin")&&<button onClick={()=>deleteMsg(item.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#cbd5e1",fontSize:12,padding:"0 2px"}}>🗑</button>}
                </div>
              </div>
            </div>;
          })}
          <div ref={bottomRef}/>
        </div>
        <div style={{padding:"12px 16px",borderTop:"1px solid #f1f5f9",background:"#fff"}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
              placeholder={`${activeRoom} 채팅방에 메시지 입력... (Enter)`}
              style={{flex:1,border:"1px solid #e5e7eb",borderRadius:12,padding:"10px 16px",fontSize:13,outline:"none",background:"#f8fafc"}}/>
            <button onClick={send} disabled={!input.trim()} style={{padding:"10px 20px",borderRadius:12,border:"none",background:input.trim()?roomColors[activeRoom]:"#e5e7eb",color:"#fff",fontSize:13,fontWeight:700,cursor:input.trim()?"pointer":"default"}}>전송</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── 메인 App ── */
function App() {
  const [user,    setUser]    = useState(null);
  const [tab,     setTab]     = useState("전체 현황");
  const [rows,    setRows]    = useState([]);
  const [adminPw, setAdminPw] = useState(DEFAULT_ADMIN_PW);
  const [members, setMembers] = useState(DEFAULT_MEMBERS);
  const [ready,   setReady]   = useState(false);

  /* ── Firebase 실시간 리스너 ── */
  useEffect(()=>{
    // 3초 안에 Firebase 응답 없으면 기본값으로 진행
    const fallback = setTimeout(()=>setReady(true), 3000);

    // 설정 로드
    db.ref("settings").on("value", snap=>{
  const s=snap.val();
  if(s){
    if(s.adminPw) {
      setAdminPw(s.adminPw);
      window._adminPw = s.adminPw;
    }
    if(s.members) setMembers(s.members);
  }
  setReady(true);
});

// 현장 데이터 로드
db.ref("rows").on("value", snap=>{
  const data=snap.val();
  if(data){
    setRows(Object.values(data).sort((a,b)=>a.no-b.no));
  } else {
    fbSetRows(INIT_ROWS);
    setRows(INIT_ROWS);
  }
});

    return()=>{
      db.ref("settings").off();
      db.ref("rows").off();
    };
  },[]);

  const isAdmin = user?.role==="admin";
  const updProg = (id, step) => {
    const updated = rows.map(row=>row.id===id?{...row,progress:step}:row);
    setRows(updated); fbSetRows(updated);

  if(!ready) return (
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>

      <div style={{fontSize:13,color:"#64748b"}}>Firebase 연결 중...</div>
      <div style={{width:40,height:40,border:"3px solid #334155",borderTopColor:"#3b82f6",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>

  );

  if(!user) return <LoginScreen onLogin={u=>{setUser(u);setTab("전체 현황");}} adminPw={adminPw} members={members}/>;

  const adminTabs=[
    {icon:"▦",label:"전체 현황"},{icon:"📅",label:"일정 관리"},{icon:"🚨",label:"긴급 보고서"},
    {icon:"🏫",label:"현장 관리"},{icon:"💰",label:"매출 현황",adminOnly:true},
    {icon:"💬",label:"팀 채팅"},{icon:"👥",label:"팀원 관리",adminOnly:true},{icon:"⚙️",label:"설정",adminOnly:true},
  ];
  const memberTabs=[
    {icon:"▦",label:"전체 현황"},{icon:"📅",label:"일정 관리"},{icon:"🚨",label:"긴급 보고서"},
    {icon:"🏫",label:"현장 관리"},{icon:"💬",label:"팀 채팅"},
  ];
  const sideItems=isAdmin?adminTabs:memberTabs;
  const total=rows.length,done=rows.filter(r=>r.progress===6).length;
  const inProg=rows.filter(r=>r.progress>0&&r.progress<6).length,delayed=rows.filter(r=>r.status==="지연").length;

        <div style={{padding:"0 22px 20px",borderBottom:"1px solid #1e293b"}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:3}}>TEAM DASHBOARD</div>
          <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>현장조사팀</div>
          <div style={{marginTop:8,display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:isAdmin?"#f97316":MC[user.name]||"#1d4ed8",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>{user.name[0]}</div>
            <div><div style={{fontSize:12,color:"#fff",fontWeight:600}}>{user.name}</div><div style={{fontSize:10,color:isAdmin?"#fb923c":"#22c55e"}}>{isAdmin?"🔐 관리자":"● 팀원"}</div></div>
          </div>
        </div>
        <div style={{padding:"12px 10px",flex:1}}>
          {sideItems.map(item=>(
            <div key={item.label} onClick={()=>setTab(item.label)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,cursor:"pointer",marginBottom:3,background:tab===item.label?"#1e40af":"transparent",color:tab===item.label?"#fff":item.adminOnly?"#fb923c":"#94a3b8",fontWeight:tab===item.label?700:400,fontSize:13}}>
              <span>{item.icon}</span>{item.label}
              {item.adminOnly&&<span style={{marginLeft:"auto",fontSize:9,background:"rgba(249,115,22,.2)",color:"#fb923c",borderRadius:4,padding:"1px 5px"}}>관리자</span>}

            {[...rows].filter(r=>r.progress<6).sort((a,b)=>diffDays(a.완수일)-diffDays(b.완수일)).map((r,i)=>{
              const d=diffDays(r.완수일),ug=urgColor(d),rc=i===0?"#ef4444":i===1?"#f97316":i===2?"#eab308":"#94a3b8";
              return<div key={r.id} style={{display:"flex",alignItems:"center",padding:"13px 20px",borderBottom:"1px solid #f1f5f9",gap:12,background:i===0?"#fff8f8":i===1?"#fff9f5":"#fff"}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:rc,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,flexShrink:0}}>{i+1}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{r.학교명} <span style={{fontSize:11,color:"#64748b",fontWeight:400}}>· {r.시설명}</span></div><PBar step={r.progress||0} compact/></div>
                <div style={{fontSize:11,color:"#64748b",flexShrink:0}}>완수: {r.완수일||"-"}</div>
                {r.lead&&<div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}><Av name={r.lead} size={22}/><span style={{fontSize:11}}>{r.lead}</span></div>}
                <div style={{background:ug.bg,color:ug.color,borderRadius:10,padding:"7px 14px",fontWeight:800,fontSize:18,minWidth:60,textAlign:"center",flexShrink:0}}>{dLabel(d)}</div>
                {isAdmin&&<div style={{display:"flex",gap:4,flexShrink:0,flexWrap:"wrap"}}>
                  {STEPS_SHORT.map((st,idx)=><button key={st} onClick={()=>updProg(r.id,idx+1)} style={{padding:"3px 8px",borderRadius:20,border:"1px solid",fontSize:10,cursor:"pointer",fontWeight:600,borderColor:r.progress===idx+1?"#1d4ed8":r.progress>idx+1?"#86efac":"#e5e7eb",background:r.progress===idx+1?"#1d4ed8":r.progress>idx+1?"#f0fdf4":"#fff",color:r.progress===idx+1?"#fff":r.progress>idx+1?"#16a34a":"#6b7280"}}>{r.progress>idx+1?"✓":""}{st}</button>)}
                </div>}
              </div>;
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
